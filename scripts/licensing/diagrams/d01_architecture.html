<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Commercial Licensing — Architecture</title>
<style>
  @page { size: 1600px 1100px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1600px; height: 1100px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 28px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">01</span>
    <h1>Commercial Licensing Architecture — Internal Architecture (5 Layers)</h1>
    <span class="sub">Hardware Lock · Activation · License Server · Anti-Crack · Audit</span>
  </div>
  <svg width="1480" height="850" viewBox="0 0 1480 850">
    <rect x="20" y="380" width="160" height="90" fill="#F8FAFC" stroke="#14213D" stroke-width="1.5"/>
    <text x="100" y="410" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">TITAN Client</text>
    <text x="100" y="430" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">trading system</text>
    <text x="100" y="448" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">on licensee VPS</text>
    <rect x="1300" y="380" width="160" height="90" fill="#14213D"/>
    <text x="1380" y="410" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">License Server</text>
    <text x="1380" y="430" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">AWS SaaS</text>
    <text x="1380" y="448" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">JWT issuance</text>
    <rect x="220" y="40" width="1060" height="800" fill="#FAFBFC" stroke="#C8102E" stroke-width="2" rx="8"/>
    <rect x="220" y="40" width="1060" height="36" fill="#C8102E" rx="8"/>
    <text x="750" y="63" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Tinos">Commercial Licensing Architecture (CLA)</text>

    <text x="250" y="105" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L1 · HARDWARE FINGERPRINT (3 identifiers · SHA-256 composite)</text>
    <rect x="250" y="115" width="320" height="90" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="410" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">CPUID Fingerprint</text>
    <text x="410" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">CPUID instruction (EAX/EBX/ECX/EDX)</text>
    <text x="410" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">manufacturer + model + stepping</text>
    <text x="410" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">SHA-256 hash · 64 hex chars</text>
    <text x="410" y="200" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">unique per CPU · cannot change</text>

    <rect x="590" y="115" width="320" height="90" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="750" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">Motherboard ID</text>
    <text x="750" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">SMBIOS/DMI: baseboard serial</text>
    <text x="750" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">WMI: Win32_BaseBoard.SerialNumber</text>
    <text x="750" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">SHA-256 hash · 64 hex chars</text>
    <text x="750" y="200" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">unique per motherboard</text>

    <rect x="930" y="115" width="320" height="90" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1090" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">Windows SID</text>
    <text x="1090" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">machine SID from registry</text>
    <text x="1090" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">HKLM\SOFTWARE\Microsoft\Cryptography\MachineGuid</text>
    <text x="1090" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">SHA-256 hash · 64 hex chars</text>
    <text x="1090" y="200" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">unique per Windows install</text>

    <rect x="250" y="220" width="1000" height="40" fill="#14213D"/>
    <text x="750" y="245" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">Composite Hardware Fingerprint = SHA-256(CPUID_hash + MB_hash + SID_hash)</text>

    <text x="250" y="290" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L2 · ACTIVATION ENGINE (online + offline)</text>
    <rect x="250" y="300" width="320" height="90" fill="#F0FDF4" stroke="#14213D"/>
    <text x="410" y="325" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">OnlineActivation</text>
    <text x="410" y="345" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">HTTPS POST to license server</text>
    <text x="410" y="360" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">sends: tenant_id + hw_fingerprint</text>
    <text x="410" y="374" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">receives: RSA-signed JWT</text>
    <text x="410" y="388" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">latency: ~2s · 1h heartbeat</text>

    <rect x="590" y="300" width="320" height="90" fill="#FEFBEB" stroke="#B45309" stroke-width="2"/>
    <text x="750" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309" font-family="Tinos">OfflineActivation</text>
    <text x="750" y="345" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">operator generates request code</text>
    <text x="750" y="360" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">→ email to TITAN support</text>
    <text x="750" y="374" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">→ receive activation key</text>
    <text x="750" y="388" text-anchor="middle" font-size="9" fill="#B45309" font-family="JetBrains Mono" font-weight="bold">7-day grace · manual process</text>

    <rect x="930" y="300" width="320" height="90" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1090" y="325" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">LicenseValidator</text>
    <text x="1090" y="345" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">verify RSA signature (embedded pubkey)</text>
    <text x="1090" y="360" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">check expiry · check hw_fingerprint</text>
    <text x="1090" y="374" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">extract claims (tier, features, limits)</text>
    <text x="1090" y="388" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">→ approve / reject / grace</text>

    <text x="250" y="420" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L3 · LICENSE SERVER (SaaS · AWS)</text>
    <rect x="250" y="430" width="320" height="80" fill="#14213D"/>
    <text x="410" y="455" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" font-family="Tinos">JWT Issuer</text>
    <text x="410" y="473" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">RSA-4096 signing key</text>
    <text x="410" y="487" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">claims: tier, features, expiry, hw_fp</text>
    <text x="410" y="500" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">1h heartbeat · 7-day grace</text>

    <rect x="590" y="430" width="320" height="80" fill="#14213D"/>
    <text x="750" y="455" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" font-family="Tinos">TenantManager</text>
    <text x="750" y="473" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">tenant CRUD · billing integration</text>
    <text x="750" y="487" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">3 activations/year auto</text>
    <text x="750" y="500" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">additional: support ticket</text>

    <rect x="930" y="430" width="320" height="80" fill="#14213D"/>
    <text x="1090" y="455" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" font-family="Tinos">RevocationService</text>
    <text x="1090" y="473" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">revoke license → next heartbeat</text>
    <text x="1090" y="487" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">graceful: flatten + halt</text>
    <text x="1090" y="500" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">audit: revocation timestamp + reason</text>

    <text x="250" y="540" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L4 · ANTI-CRACK DEFENSE (5 layers)</text>
    <rect x="250" y="550" width="190" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="345" y="575" text-anchor="middle" font-size="10" font-weight="700" fill="#C8102E" font-family="Tinos">Code Obfuscation</text>
    <text x="345" y="593" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">C++: symbol strip + LTO</text>
    <text x="345" y="607" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Python: Cython → .pyd</text>
    <text x="345" y="621" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">string encryption</text>

    <rect x="460" y="550" width="190" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="555" y="575" text-anchor="middle" font-size="10" font-weight="700" fill="#C8102E" font-family="Tinos">Tamper Detection</text>
    <text x="555" y="593" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">binary checksum (startup)</text>
    <text x="555" y="607" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">periodic re-check (hourly)</text>
    <text x="555" y="621" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">mismatch → graceful halt</text>

    <rect x="670" y="550" width="190" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="765" y="575" text-anchor="middle" font-size="10" font-weight="700" fill="#C8102E" font-family="Tinos">Anti-Debug</text>
    <text x="765" y="593" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">IsDebuggerPresent()</text>
    <text x="765" y="607" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">NtQueryInformationProcess</text>
    <text x="765" y="621" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">timing checks (RDTSC)</text>

    <rect x="880" y="550" width="190" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="975" y="575" text-anchor="middle" font-size="10" font-weight="700" fill="#C8102E" font-family="Tinos">Anti-VM</text>
    <text x="975" y="593" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">MAC OUI check (VMware/VBox)</text>
    <text x="975" y="607" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">CPUID hypervisor bit</text>
    <text x="975" y="621" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">registry artifacts</text>

    <rect x="1090" y="550" width="160" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1170" y="575" text-anchor="middle" font-size="10" font-weight="700" fill="#C8102E" font-family="Tinos">Behavioral</text>
    <text x="1170" y="593" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">geo-IP anomaly detect</text>
    <text x="1170" y="607" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">multi-IP flag</text>
    <text x="1170" y="621" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">rate limit per tenant</text>

    <text x="250" y="665" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L5 · LICENSE EXPIRY &amp; ENFORCEMENT</text>
    <rect x="250" y="675" width="320" height="80" fill="#14213D"/>
    <text x="410" y="700" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" font-family="Tinos">ExpiryManager</text>
    <text x="410" y="720" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">Monthly / Quarterly / Yearly</text>
    <text x="410" y="734" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">check on every heartbeat (1h)</text>
    <text x="410" y="748" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">7-day grace → flatten → halt</text>

    <rect x="590" y="675" width="320" height="80" fill="#14213D"/>
    <text x="750" y="700" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" font-family="Tinos">FeatureGate</text>
    <text x="750" y="720" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">tier-based feature access</text>
    <text x="750" y="734" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">Starter / Pro / Enterprise</text>
    <text x="750" y="748" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">hard boundary · no bypass</text>

    <rect x="930" y="675" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1090" y="700" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">LicenseAuditLogger</text>
    <text x="1090" y="720" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">every activation · every heartbeat</text>
    <text x="1090" y="734" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">every expiry · every revocation</text>
    <text x="1090" y="748" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">hash-chained WORM store</text>

    <g stroke="#C8102E" stroke-width="2" fill="none" marker-end="url(#arA)">
      <line x1="180" y1="425" x2="250" y2="160"/>
      <line x1="1250" y1="470" x2="1300" y2="425"/>
    </g>
    <defs><marker id="arA" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#C8102E"/></marker></defs>
  </svg>
</div>
</body>
</html>
