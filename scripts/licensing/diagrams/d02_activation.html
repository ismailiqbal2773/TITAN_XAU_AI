<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Commercial Licensing — Activation Workflow</title>
<style>
  @page { size: 1400px 1800px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1400px; height: 1800px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 26px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">02</span>
    <h1>Activation Workflow — Online + Offline + Heartbeat + Expiry</h1>
    <span class="sub">Full lifecycle: install → activate → heartbeat → renew/expire</span>
  </div>
  <svg width="1280" height="1600" viewBox="0 0 1280 1600">
    <defs>
      <marker id="ar2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#14213D"/></marker>
      <marker id="ar2R" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#C8102E"/></marker>
      <marker id="ar2G" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#15803D"/></marker>
    </defs>

    <ellipse cx="640" cy="40" rx="180" ry="24" fill="#14213D"/>
    <text x="640" y="46" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">START — TITAN installed on licensee VPS</text>
    <line x1="640" y1="64" x2="640" y2="92" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <rect x="460" y="95" width="360" height="70" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="120" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">1. HARDWARE FINGERPRINT</text>
    <text x="640" y="138" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">CPUID + Motherboard ID + Windows SID</text>
    <text x="640" y="152" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">→ SHA-256 composite (64 hex chars)</text>
    <line x1="640" y1="165" x2="640" y2="190" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="640,195 820,245 640,295 460,245" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="640" y="235" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">Activation mode?</text>
    <text x="640" y="253" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">online (internet available)</text>
    <text x="640" y="268" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">or offline (air-gapped)</text>
    <text x="640" y="283" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">determined at install time</text>

    <line x1="460" y1="245" x2="280" y2="245" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>
    <text x="370" y="237" font-size="11" fill="#4A5568" font-family="JetBrains Mono">OFFLINE</text>
    <line x1="820" y1="245" x2="1000" y2="245" stroke="#15803D" stroke-width="2" marker-end="url(#ar2G)"/>
    <text x="900" y="237" font-size="11" fill="#15803D" font-family="JetBrains Mono">ONLINE</text>

    <!-- Online path -->
    <rect x="1000" y="200" width="240" height="100" fill="#F0FDF4" stroke="#14213D" stroke-width="2"/>
    <text x="1120" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D" font-family="Tinos">2a. ONLINE ACTIVATION</text>
    <text x="1020" y="248" font-size="9" fill="#4A5568" font-family="JetBrains Mono">HTTPS POST to license server</text>
    <text x="1020" y="262" font-size="9" fill="#4A5568" font-family="JetBrains Mono">payload: tenant_id + hw_fingerprint</text>
    <text x="1020" y="276" font-size="9" fill="#4A5568" font-family="JetBrains Mono">mTLS · TLS 1.3</text>
    <text x="1020" y="290" font-size="9" fill="#15803D" font-family="JetBrains Mono" font-weight="bold">latency: ~2 seconds</text>

    <!-- Offline path -->
    <rect x="40" y="200" width="240" height="100" fill="#FEFBEB" stroke="#B45309" stroke-width="2"/>
    <text x="160" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309" font-family="Tinos">2b. OFFLINE ACTIVATION</text>
    <text x="60" y="248" font-size="9" fill="#4A5568" font-family="JetBrains Mono">generate request code</text>
    <text x="60" y="262" font-size="9" fill="#4A5568" font-family="JetBrains Mono">→ email to TITAN support</text>
    <text x="60" y="276" font-size="9" fill="#4A5568" font-family="JetBrains Mono">← receive activation key</text>
    <text x="60" y="290" font-size="9" fill="#B45309" font-family="JetBrains Mono" font-weight="bold">latency: up to 24 hours</text>

    <line x1="1120" y1="300" x2="840" y2="345" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>
    <line x1="160" y1="300" x2="440" y2="345" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <rect x="380" y="350" width="520" height="100" fill="#14213D"/>
    <text x="640" y="378" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">3. LICENSE SERVER VALIDATION</text>
    <text x="640" y="400" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">verify tenant_id · check hw_fingerprint · check billing status</text>
    <text x="640" y="415" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">check activations count (max 3/year) · check not revoked</text>
    <text x="640" y="430" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">→ issue RSA-4096 signed JWT with claims</text>
    <text x="640" y="444" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">claims: tier, features, max_capital, expiry, hw_fp</text>

    <line x1="640" y1="450" x2="640" y2="480" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <rect x="380" y="485" width="520" height="70" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="510" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">4. JWT RECEIVED &amp; CACHED LOCALLY</text>
    <text x="640" y="528" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">stored: /var/lib/titan/license.jwt (encrypted)</text>
    <text x="640" y="542" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">AES-256 encrypted at rest · key derived from hw_fingerprint</text>
    <line x1="640" y1="555" x2="640" y2="580" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <rect x="380" y="585" width="520" height="60" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="640" y="610" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">5. LICENSE VALIDATION (startup + every 1h heartbeat)</text>
    <text x="640" y="628" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">verify RSA signature · check expiry · check hw_fingerprint match</text>
    <line x1="640" y1="645" x2="640" y2="670" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="640,675 840,730 640,785 440,730" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="640" y="725" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">License valid?</text>
    <text x="640" y="745" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">signature OK · not expired · hw matches · not revoked</text>

    <line x1="640" y1="785" x2="640" y2="815" stroke="#15803D" stroke-width="2" marker-end="url(#ar2G)"/>
    <text x="650" y="805" font-size="11" fill="#15803D" font-family="JetBrains Mono">YES</text>

    <rect x="460" y="820" width="360" height="60" fill="#15803D"/>
    <text x="640" y="845" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">6. TRADING ENABLED</text>
    <text x="640" y="863" text-anchor="middle" fill="#ffffff" font-size="10" font-family="JetBrains Mono">feature gates activated · heartbeat every 1h · audit logged</text>
    <line x1="640" y1="880" x2="640" y2="910" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="640,915 820,965 640,1015 460,965" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="965" text-anchor="middle" font-size="11" font-weight="bold" font-family="Tinos">Heartbeat result?</text>
    <text x="640" y="982" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">every 1h · sends hw_fp + JWT</text>
    <text x="640" y="997" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">server responds: OK / RENEW / REVOKE</text>

    <line x1="820" y1="965" x2="950" y2="965" stroke="#15803D" stroke-width="2" marker-end="url(#ar2G)"/>
    <text x="870" y="957" font-size="11" fill="#15803D" font-family="JetBrains Mono">OK / RENEW</text>
    <rect x="950" y="940" width="240" height="55" fill="#15803D"/>
    <text x="1070" y="962" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">CONTINUE TRADING</text>
    <text x="1070" y="978" text-anchor="middle" fill="#ffffff" font-size="9" font-family="JetBrains Mono">refresh JWT if renewed</text>

    <line x1="460" y1="965" x2="320" y2="965" stroke="#C8102E" stroke-width="2" marker-end="url(#ar2R)"/>
    <text x="380" y="957" font-size="11" fill="#C8102E" font-family="JetBrains Mono">REVOKE / FAIL</text>

    <rect x="100" y="940" width="220" height="80" fill="#FEFBEB" stroke="#B45309" stroke-width="2"/>
    <text x="210" y="965" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309" font-family="Tinos">7. GRACE PERIOD (7 days)</text>
    <text x="210" y="985" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">continue trading · P2 alerts</text>
    <text x="210" y="999" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">retry heartbeat every 15min</text>
    <text x="210" y="1013" text-anchor="middle" font-size="9" fill="#B45309" font-family="JetBrains Mono" font-weight="bold">operator notified to renew</text>
    <line x1="210" y1="1020" x2="210" y2="1050" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="210,1055 350,1095 210,1135 70,1095" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="210" y="1095" text-anchor="middle" font-size="11" font-weight="bold" font-family="Tinos">grace expired?</text>
    <text x="210" y="1112" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">7 days without renewal</text>

    <line x1="350" y1="1095" x2="460" y2="1095" stroke="#15803D" stroke-width="2" marker-end="url(#ar2G)"/>
    <text x="400" y="1087" font-size="11" fill="#15803D" font-family="JetBrains Mono">NO</text>
    <rect x="460" y="1070" width="180" height="55" fill="#15803D"/>
    <text x="550" y="1092" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">CONTINUE GRACE</text>
    <text x="550" y="1108" text-anchor="middle" fill="#ffffff" font-size="9" font-family="JetBrains Mono">retry heartbeat</text>

    <line x1="210" y1="1135" x2="210" y2="1165" stroke="#C8102E" stroke-width="2" marker-end="url(#ar2R)"/>
    <text x="220" y="1155" font-size="11" fill="#C8102E" font-family="JetBrains Mono">YES</text>

    <rect x="80" y="1170" width="260" height="80" fill="#C8102E"/>
    <text x="210" y="1195" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">8. GRACEFUL SHUTDOWN</text>
    <text x="210" y="1215" text-anchor="middle" fill="#ffffff" font-size="10" font-family="JetBrains Mono">halt new orders → flatten all</text>
    <text x="210" y="1230" text-anchor="middle" fill="#ffffff" font-size="10" font-family="JetBrains Mono">→ cancel pending → halt</text>
    <text x="210" y="1245" text-anchor="middle" fill="#ffffff" font-size="9" font-family="JetBrains Mono">P1 PagerDuty · audit logged</text>

    <!-- Expiry types -->
    <text x="640" y="1300" font-size="14" font-weight="700" fill="#C8102E" font-family="Tinos">LICENSE EXPIRY TYPES</text>
    <rect x="460" y="1320" width="200" height="80" fill="#F0FDF4" stroke="#14213D" stroke-width="2"/>
    <text x="560" y="1345" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">Monthly</text>
    <text x="560" y="1365" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">renew every 30 days</text>
    <text x="560" y="1380" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">auto-renew if billing OK</text>
    <text x="560" y="1395" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">Starter tier</text>

    <rect x="680" y="1320" width="200" height="80" fill="#F0FDF4" stroke="#14213D" stroke-width="2"/>
    <text x="780" y="1345" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">Quarterly</text>
    <text x="780" y="1365" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">renew every 90 days</text>
    <text x="780" y="1380" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">auto-renew if billing OK</text>
    <text x="780" y="1395" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">Pro tier</text>

    <rect x="900" y="1320" width="200" height="80" fill="#F0FDF4" stroke="#14213D" stroke-width="2"/>
    <text x="1000" y="1345" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">Yearly</text>
    <text x="1000" y="1365" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">renew every 365 days</text>
    <text x="1000" y="1380" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">auto-renew if billing OK</text>
    <text x="1000" y="1395" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">Enterprise tier</text>

    <ellipse cx="640" cy="1470" rx="200" ry="26" fill="#14213D"/>
    <text x="640" y="1477" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">END — License lifecycle complete</text>
  </svg>
</div>
</body>
</html>
