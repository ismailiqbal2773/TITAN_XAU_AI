<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retraining Framework — Workflow</title>
<style>
  @page { size: 1400px 1900px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1400px; height: 1900px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 26px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">02</span>
    <h1>Retraining Workflow — End-to-End Pipeline</h1>
    <span class="sub">Schedule trigger → data prep → train → validate → champion-challenger → deploy</span>
  </div>
  <svg width="1280" height="1700" viewBox="0 0 1280 1700">
    <defs>
      <marker id="ar2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#14213D"/></marker>
      <marker id="ar2R" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#C8102E"/></marker>
      <marker id="ar2G" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#15803D"/></marker>
    </defs>

    <ellipse cx="640" cy="40" rx="180" ry="24" fill="#14213D"/>
    <text x="640" y="46" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">START — Retrain trigger (scheduled or emergency)</text>
    <line x1="640" y1="64" x2="640" y2="92" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="640,95 820,145 640,195 460,145" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="640" y="130" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">Trigger type?</text>
    <text x="640" y="148" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">scheduled / emergency / manual</text>
    <text x="640" y="165" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">determines urgency + scope</text>
    <text x="640" y="180" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">+ skip canary if emergency</text>

    <line x1="640" y1="195" x2="640" y2="220" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <rect x="500" y="225" width="280" height="70" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="250" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">1. DATA PREPARATION</text>
    <text x="640" y="268" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">24mo × 6 brokers · feature engineering</text>
    <text x="640" y="282" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">label construction · 80/10/10 split</text>
    <line x1="640" y1="295" x2="640" y2="320" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="640,325 820,365 640,405 460,365" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="365" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">data quality OK?</text>
    <text x="640" y="382" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">NaN < 0.5% · coverage > 99.5%</text>
    <line x1="640" y1="405" x2="640" y2="430" stroke="#15803D" stroke-width="2" marker-end="url(#ar2G)"/>
    <text x="650" y="420" font-size="11" fill="#15803D" font-family="JetBrains Mono">YES</text>
    <line x1="460" y1="365" x2="320" y2="365" stroke="#C8102E" stroke-width="2" marker-end="url(#ar2R)"/>
    <text x="380" y="357" font-size="11" fill="#C8102E" font-family="JetBrains Mono">NO</text>
    <rect x="120" y="345" width="200" height="50" fill="#C8102E"/>
    <text x="220" y="368" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">ABORT RETRAIN</text>
    <text x="220" y="384" text-align="center" fill="#ffffff" font-size="9" font-family="JetBrains Mono">alert data team</text>

    <rect x="460" y="435" width="360" height="70" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="460" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">2. PARALLEL MODEL TRAINING</text>
    <text x="640" y="478" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">XGBoost (15min) + LSTM (2h) + Transformer (4h)</text>
    <text x="640" y="492" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">Optuna TPE · 200 trials · walk-forward 5 folds</text>
    <line x1="640" y1="505" x2="640" y2="530" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <rect x="460" y="535" width="360" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="560" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">3. WALK-FORWARD VALIDATION</text>
    <text x="640" y="578" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">5 folds × 4mo OOS · per-model F1 + ensemble Sharpe</text>
    <line x1="640" y1="595" x2="640" y2="620" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="640,625 840,690 640,755 440,690" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="640" y="670" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">Validation gates passed?</text>
    <text x="640" y="690" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">F1 > 0.60 · ensemble Sharpe > 2.0</text>
    <text x="640" y="705" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Sharpe drop < 5% vs champion</text>
    <text x="640" y="720" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">RoR < 1% · MaxDD < 5%</text>
    <text x="640" y="738" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">ALL gates must pass</text>

    <line x1="840" y1="690" x2="950" y2="690" stroke="#C8102E" stroke-width="2" marker-end="url(#ar2R)"/>
    <text x="880" y="682" font-size="11" fill="#C8102E" font-family="JetBrains Mono">FAIL</text>
    <rect x="950" y="665" width="240" height="55" fill="#14213D"/>
    <text x="1070" y="687" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">REJECT MODEL</text>
    <text x="1070" y="703" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">keep champion · audit · alert</text>

    <line x1="640" y1="755" x2="640" y2="785" stroke="#15803D" stroke-width="2" marker-end="url(#ar2G)"/>
    <text x="650" y="775" font-size="11" fill="#15803D" font-family="JetBrains Mono">PASS</text>

    <rect x="460" y="790" width="360" height="60" fill="#14213D"/>
    <text x="640" y="815" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">4. REGISTER AS CHALLENGER (MLflow)</text>
    <text x="640" y="833" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">version + metrics + artifacts + lineage</text>
    <line x1="640" y1="850" x2="640" y2="875" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="640,880 820,920 640,960 460,920" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="925" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">emergency retrain?</text>
    <text x="640" y="942" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">skip canary if triggered by drift</text>

    <line x1="820" y1="920" x2="950" y2="920" stroke="#C8102E" stroke-width="2" marker-end="url(#ar2R)"/>
    <text x="870" y="912" font-size="11" fill="#C8102E" font-family="JetBrains Mono">YES</text>
    <rect x="950" y="895" width="260" height="55" fill="#FEFBEB" stroke="#B45309" stroke-width="2"/>
    <text x="1080" y="917" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309" font-family="Tinos">SKIP CANARY → DIRECT PROMOTE</text>
    <text x="1080" y="935" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">emergency: 100% traffic immediately</text>

    <line x1="640" y1="960" x2="640" y2="990" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>
    <text x="650" y="980" font-size="11" fill="#4A5568" font-family="JetBrains Mono">NO</text>

    <rect x="460" y="995" width="360" height="60" fill="#FEFBEB" stroke="#B45309" stroke-width="2"/>
    <text x="640" y="1020" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309" font-family="Tinos">5. CANARY DEPLOY (10% traffic · 1 hour)</text>
    <text x="640" y="1038" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">challenger serves 10% · champion serves 90%</text>
    <line x1="640" y1="1055" x2="640" y2="1080" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="640,1085 820,1135 640,1185 460,1135" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="640" y="1135" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">canary OK?</text>
    <text x="640" y="1152" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Sharge drop < 10% · no P1 alerts</text>

    <line x1="460" y1="1135" x2="320" y2="1135" stroke="#C8102E" stroke-width="2" marker-end="url(#ar2R)"/>
    <text x="380" y="1127" font-size="11" fill="#C8102E" font-family="JetBrains Mono">NO</text>
    <rect x="120" y="1110" width="200" height="55" fill="#C8102E"/>
    <text x="220" y="1133" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">AUTO-ROLLBACK</text>
    <text x="220" y="1150" text-anchor="middle" fill="#ffffff" font-size="9" font-family="JetBrains Mono">revert to champion · &lt;30s</text>

    <line x1="640" y1="1185" x2="640" y2="1215" stroke="#15803D" stroke-width="2" marker-end="url(#ar2G)"/>
    <text x="650" y="1205" font-size="11" fill="#15803D" font-family="JetBrains Mono">YES</text>

    <rect x="460" y="1220" width="360" height="60" fill="#FEFBEB" stroke="#B45309" stroke-width="2"/>
    <text x="640" y="1245" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309" font-family="Tinos">6. A/B TEST (50% traffic · 24 hours)</text>
    <text x="640" y="1263" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">challenger vs champion · statistical comparison</text>
    <line x1="640" y1="1280" x2="640" y2="1305" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <polygon points="640,1310 840,1370 640,1430 440,1370" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="640" y="1360" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">Challenger beats champion?</text>
    <text x="640" y="1380" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Sharpe(challenger) > Sharpe(champion)</text>
    <text x="640" y="1395" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">AND MaxDD(challenger) ≤ MaxDD(champion)</text>
    <text x="640" y="1412" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">AND F1(challenger) ≥ F1(champion) - 0.02</text>

    <line x1="440" y1="1370" x2="320" y2="1370" stroke="#C8102E" stroke-width="2" marker-end="url(#ar2R)"/>
    <text x="380" y="1362" font-size="11" fill="#C8102E" font-family="JetBrains Mono">NO</text>
    <rect x="120" y="1345" width="200" height="55" fill="#14213D"/>
    <text x="220" y="1368" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">KEEP CHAMPION</text>
    <text x="220" y="1385" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">challenger archived</text>

    <line x1="640" y1="1430" x2="640" y2="1460" stroke="#15803D" stroke-width="2" marker-end="url(#ar2G)"/>
    <text x="650" y="1450" font-size="11" fill="#15803D" font-family="JetBrains Mono">YES</text>

    <rect x="460" y="1465" width="360" height="60" fill="#14213D"/>
    <text x="640" y="1490" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">7. PROMOTE CHALLENGER → CHAMPION</text>
    <text x="640" y="1508" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">100% traffic · old champion archived (rollback target)</text>
    <line x1="640" y1="1525" x2="640" y2="1555" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <rect x="460" y="1560" width="360" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="1585" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">8. AUDIT &amp; NOTIFY</text>
    <text x="640" y="1603" text-anchor="middle" font-size="10" fill="#4A5568" font-family="JetBrains Mono">log: model lineage · metrics · diff · approver</text>
    <line x1="640" y1="1620" x2="640" y2="1650" stroke="#14213D" stroke-width="2" marker-end="url(#ar2)"/>

    <ellipse cx="640" cy="1685" rx="220" ry="26" fill="#15803D"/>
    <text x="640" y="1692" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">END — New champion deployed in production</text>
  </svg>
</div>
</body>
</html>
