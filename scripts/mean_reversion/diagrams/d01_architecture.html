<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mean Reversion Strategy — Architecture</title>
<style>
  @page { size: 1600px 1100px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1600px; height: 1100px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 28px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">01</span>
    <h1>Mean Reversion Strategy — Internal Architecture (5 Layers)</h1>
    <span class="sub">Gate · Detection · Recovery · Risk · Audit</span>
  </div>

  <svg width="1480" height="850" viewBox="0 0 1480 850">
    <!-- External inputs -->
    <rect x="20" y="380" width="160" height="90" fill="#F8FAFC" stroke="#14213D" stroke-width="1.5"/>
    <text x="100" y="410" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">Regime Detector</text>
    <text x="100" y="430" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">RANGE label + scores</text>
    <text x="100" y="448" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">confidence &gt; 0.65</text>

    <rect x="20" y="500" width="160" height="70" fill="#F8FAFC" stroke="#14213D" stroke-width="1.5"/>
    <text x="100" y="525" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">Market Data</text>
    <text x="100" y="543" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">M5/M15 bars</text>
    <text x="100" y="557" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">+ features</text>

    <rect x="1300" y="380" width="160" height="90" fill="#14213D"/>
    <text x="1380" y="410" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">Execution Engine</text>
    <text x="1380" y="430" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">Signal → Order</text>
    <text x="1380" y="448" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">+ recovery orders</text>

    <!-- Engine container -->
    <rect x="220" y="40" width="1060" height="800" fill="#FAFBFC" stroke="#C8102E" stroke-width="2" rx="8"/>
    <rect x="220" y="40" width="1060" height="36" fill="#C8102E" rx="8"/>
    <text x="750" y="63" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Tinos">Mean Reversion Strategy (MRS)</text>

    <!-- L1 Gate -->
    <text x="250" y="105" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L1 · REGIME GATE (RANGE only)</text>

    <rect x="250" y="115" width="320" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="410" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">RegimeGateFilter</text>
    <text x="410" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">require label == RANGE</text>
    <text x="410" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">confidence &gt; 0.65</text>
    <text x="410" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">P(TREND) &lt; 0.25 · P(VOLATILE) &lt; 0.20</text>

    <rect x="590" y="115" width="320" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="750" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">RangeQualityFilter</text>
    <text x="750" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">BBW percentile &lt; 40% (narrow)</text>
    <text x="750" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ADX &lt; 20 (no trend)</text>
    <text x="750" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Hurst &lt; 0.45 (mean-reverting)</text>

    <rect x="930" y="115" width="320" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1090" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">SessionFilter</text>
    <text x="1090" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">London + NY preferred</text>
    <text x="1090" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">avoid Asia (thin liquidity)</text>
    <text x="1090" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">news blackout enforced</text>

    <!-- L2 Detection -->
    <text x="250" y="225" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L2 · ENTRY DETECTION (4 indicators → composite score)</text>

    <rect x="250" y="235" width="220" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="360" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">Bollinger Bands</text>
    <text x="360" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">20-period · 2σ</text>
    <text x="360" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">touch lower band → long</text>
    <text x="360" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">touch upper band → short</text>
    <text x="360" y="320" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">%B &lt; 0.05 or &gt; 0.95</text>

    <rect x="490" y="235" width="220" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="600" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">RSI</text>
    <text x="600" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">14-period · Wilder</text>
    <text x="600" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">RSI &lt; 30 → oversold (long)</text>
    <text x="600" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">RSI &gt; 70 → overbought (short)</text>
    <text x="600" y="320" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">divergence detection</text>

    <rect x="730" y="235" width="220" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="840" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">ATR</text>
    <text x="840" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">14-period · normalized</text>
    <text x="840" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">stop = 1.5 × ATR from entry</text>
    <text x="840" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">target = mid band (mean)</text>
    <text x="840" y="320" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">vol filter: ATR pct &lt; 60%</text>

    <rect x="970" y="235" width="280" height="100" fill="#14213D"/>
    <text x="1110" y="258" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">Mean Reversion Score</text>
    <text x="1110" y="280" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">MR_score = w1·BB + w2·RSI</text>
    <text x="1110" y="294" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">           + w3·ATR + w4·Hurst</text>
    <text x="1110" y="310" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">weights: 0.30, 0.30, 0.20, 0.20</text>
    <text x="1110" y="324" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">threshold: MR_score &gt; 0.65</text>

    <!-- L3 Recovery -->
    <text x="250" y="365" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L3 · SMART RECOVERY (NOT martingale · capped at 1.6x)</text>

    <rect x="250" y="375" width="320" height="100" fill="#FEFBEB" stroke="#B45309" stroke-width="2"/>
    <text x="410" y="400" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309" font-family="Tinos">RecoveryLevelManager</text>
    <text x="410" y="420" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Level 0: 1.0x (base — initial entry)</text>
    <text x="410" y="434" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Level 1: 1.3x (after 1 loss — tighter entry)</text>
    <text x="410" y="448" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Level 2: 1.6x (after 2 losses — max)</text>
    <text x="410" y="466" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="700">Level 3: BLOCKED (3+ losses → stop)</text>

    <rect x="590" y="375" width="320" height="100" fill="#FEFBEB" stroke="#B45309" stroke-width="2"/>
    <text x="750" y="400" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309" font-family="Tinos">RecoveryEntryLogic</text>
    <text x="750" y="420" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">wait for BETTER entry (not immediate)</text>
    <text x="750" y="434" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">require MR_score &gt; 0.75 (stricter)</text>
    <text x="750" y="448" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">require confluence (2+ indicators)</text>
    <text x="750" y="466" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="700">NOT: double-down blindly</text>

    <rect x="930" y="375" width="320" height="100" fill="#FEFBEB" stroke="#B45309" stroke-width="2"/>
    <text x="1090" y="400" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309" font-family="Tinos">RecoveryCooldown</text>
    <text x="1090" y="420" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">min 3 bars between recovery entries</text>
    <text x="1090" y="434" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">max 2 recovery attempts per range</text>
    <text x="1090" y="448" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">reset to Level 0 on any win</text>
    <text x="1090" y="466" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="700">halt strategy after Level 2 loss</text>

    <!-- L4 Risk -->
    <text x="250" y="505" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L4 · RISK CONTROLS</text>

    <rect x="250" y="515" width="490" height="100" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="495" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">AdaptivePositionSizer</text>
    <text x="495" y="560" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">base_risk = 0.8% equity (lower than trend)</text>
    <text x="495" y="574" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">× regime_confidence × recovery_multiplier</text>
    <text x="495" y="588" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">× vol_regime_factor (ATR pct inverse)</text>
    <text x="495" y="606" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">effective_risk = 0.8% × conf × {1.0, 1.3, 1.6} × vol</text>

    <rect x="760" y="515" width="490" height="100" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1005" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">RiskGateClient</text>
    <text x="1005" y="560" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">max 2 concurrent MR positions</text>
    <text x="1005" y="574" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">max daily loss: 1.5% equity (lower)</text>
    <text x="1005" y="588" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">range break = immediate exit (not hold)</text>
    <text x="1005" y="606" text-anchor="middle" font-size="9" fill="#C8102E" font-family="JetBrains Mono" font-weight="bold">margin floor: 35% (higher than trend)</text>

    <!-- L5 Audit -->
    <text x="250" y="645" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L5 · AUDIT &amp; OBSERVABILITY</text>

    <rect x="250" y="655" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="410" y="680" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">SignalLogger</text>
    <text x="410" y="698" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">entry score + recovery level</text>
    <text x="410" y="712" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">exit reason + R-multiple</text>
    <text x="410" y="726" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">range break events</text>

    <rect x="590" y="655" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="750" y="680" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">RecoveryTracker</text>
    <text x="750" y="698" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">current recovery level (0-2)</text>
    <text x="750" y="712" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">consecutive loss count</text>
    <text x="750" y="726" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">recovery success rate</text>

    <rect x="930" y="655" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1090" y="680" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">AuditEmitter</text>
    <text x="1090" y="698" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ZMQ PUB: mr.signal</text>
    <text x="1090" y="712" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ZMQ PUB: mr.recovery</text>
    <text x="1090" y="726" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">hash-chained audit log</text>

    <!-- Arrows -->
    <g stroke="#C8102E" stroke-width="2" fill="none" marker-end="url(#arA)">
      <line x1="180" y1="425" x2="250" y2="155"/>
      <line x1="180" y1="525" x2="250" y2="285"/>
      <line x1="1250" y1="395" x2="1300" y2="425"/>
    </g>

    <defs>
      <marker id="arA" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L7,3 z" fill="#C8102E"/>
      </marker>
    </defs>
  </svg>
</div>
</body>
</html>
