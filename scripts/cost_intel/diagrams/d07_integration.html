<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECI — Cost Flow & Integration</title>
<style>
  @page { size: 1600px 800px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1600px; height: 800px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 26px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
  .table { width: 100%; border-collapse: collapse; font-size: 10.5px; margin-top: 14px; }
  .table th { background: #14213D; color: #ffffff; padding: 6px 8px; text-align: left; font-weight: 700; }
  .table td { padding: 5px 8px; border-bottom: 1px solid #E2E8F0; }
  .table tr:nth-child(even) td { background: #F8FAFC; }
  .table .mod { color: #14213D; font-family: 'JetBrains Mono',monospace; font-weight: 700; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">07</span>
    <h1>Cost Flow & TITAN Core Integration</h1>
    <span class="sub">Signal → cost estimate → edge decision → execute → realized cost → feedback</span>
  </div>

  <svg width="1480" height="380" viewBox="0 0 1480 380">
    <defs><marker id="ar7" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#14213D"/></marker></defs>

    <rect x="40" y="20" width="180" height="60" fill="#F8FAFC" stroke="#14213D"/>
    <text x="130" y="45" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">Strategy Signal</text>
    <text x="130" y="62" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">dir + size + SL + exp_pnl</text>
    <line x1="220" y1="50" x2="260" y2="50" stroke="#14213D" stroke-width="2" marker-end="url(#ar7)"/>

    <rect x="260" y="20" width="180" height="60" fill="#14213D"/>
    <text x="350" y="45" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" font-family="Tinos">ECI: Cost Estimate</text>
    <text x="350" y="62" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">5 components computed</text>
    <line x1="440" y1="50" x2="480" y2="50" stroke="#14213D" stroke-width="2" marker-end="url(#ar7)"/>

    <rect x="480" y="20" width="180" height="60" fill="#14213D"/>
    <text x="570" y="45" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" font-family="Tinos">ECI: Edge Decision</text>
    <text x="570" y="62" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">edge > threshold?</text>
    <line x1="660" y1="50" x2="700" y2="50" stroke="#14213D" stroke-width="2" marker-end="url(#ar7)"/>

    <rect x="700" y="20" width="180" height="60" fill="#F0FDF4" stroke="#15803D" stroke-width="2"/>
    <text x="790" y="45" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D" font-family="Tinos">APPROVE</text>
    <text x="790" y="62" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">→ Execution Engine</text>
    <line x1="880" y1="50" x2="920" y2="50" stroke="#14213D" stroke-width="2" marker-end="url(#ar7)"/>

    <rect x="920" y="20" width="180" height="60" fill="#F8FAFC" stroke="#14213D"/>
    <text x="1010" y="45" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">Fill Received</text>
    <text x="1010" y="62" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">actual price + qty</text>
    <line x1="1100" y1="50" x2="1140" y2="50" stroke="#14213D" stroke-width="2" marker-end="url(#ar7)"/>

    <rect x="1140" y="20" width="180" height="60" fill="#14213D"/>
    <text x="1230" y="45" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" font-family="Tinos">ECI: Realized Cost</text>
    <text x="1230" y="62" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">actual spread+slip+comm</text>
    <line x1="1320" y1="50" x2="1360" y2="50" stroke="#14213D" stroke-width="2" marker-end="url(#ar7)"/>

    <rect x="1360" y="20" width="80" height="60" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1400" y="45" text-anchor="middle" font-size="10" font-weight="700" fill="#C8102E" font-family="Tinos">CES +</text>
    <text x="1400" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#C8102E" font-family="Tinos">BQS</text>

    <!-- Feedback -->
    <path d="M 1400 80 Q 1400 200 570 200 Q 570 180 570 80" stroke="#C8102E" stroke-width="2" fill="none" marker-end="url(#ar7)" stroke-dasharray="6 3"/>
    <text x="900" y="195" text-anchor="middle" font-size="10" fill="#C8102E" font-family="JetBrains Mono">FEEDBACK LOOP: realized cost → retrain slippage + latency + edge threshold</text>

    <!-- Reject path -->
    <rect x="480" y="120" width="180" height="50" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="570" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">REJECT</text>
    <text x="570" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">edge ≤ threshold · no trade</text>
    <line x1="570" y1="80" x2="570" y2="120" stroke="#C8102E" stroke-width="2" marker-end="url(#ar7)" stroke-dasharray="4 2"/>

    <!-- Integration table -->
    <text x="40" y="250" font-size="14" font-weight="700" fill="#C8102E" font-family="Tinos">TITAN CORE INTEGRATION POINTS</text>
    <g font-family="JetBrains Mono" font-size="11" fill="#14213D">
      <text x="60" y="280">▸ Broker Compatibility Engine (Module 2): provides commission type/rate, swap rates, tick value</text>
      <text x="60" y="305">▸ Execution Engine (Module 3): receives APPROVE/REJECT · provides fill data for realized cost</text>
      <text x="60" y="330">▸ Regime Detection (Module 4): provides ATR percentile for dynamic threshold + slippage regime adjustment</text>
      <text x="60" y="355">▸ Risk Engine (Module 8): edge threshold is mode-parameterized (Conservative: higher threshold)</text>
    </g>
  </svg>
</div>
</body>
</html>
