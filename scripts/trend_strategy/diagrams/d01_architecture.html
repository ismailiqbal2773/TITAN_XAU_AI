<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Institutional Trend Following Strategy — Architecture</title>
<style>
  @page { size: 1600px 1100px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1600px; height: 1100px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 28px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">01</span>
    <h1>Trend Following Strategy — Internal Architecture (5 Layers)</h1>
    <span class="sub">Gate · Entry · Management · Risk · Audit</span>
  </div>

  <svg width="1480" height="850" viewBox="0 0 1480 850">
    <!-- External inputs -->
    <rect x="20" y="380" width="160" height="90" fill="#F8FAFC" stroke="#14213D" stroke-width="1.5"/>
    <text x="100" y="410" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">Regime Detector</text>
    <text x="100" y="430" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">TREND label + scores</text>
    <text x="100" y="448" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">confidence &gt; 0.65</text>

    <rect x="20" y="490" width="160" height="70" fill="#F8FAFC" stroke="#14213D" stroke-width="1.5"/>
    <text x="100" y="515" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">Market Data</text>
    <text x="100" y="533" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ticks + M5/M15/H1</text>
    <text x="100" y="547" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">bars + features</text>

    <rect x="1300" y="380" width="160" height="90" fill="#14213D"/>
    <text x="1380" y="410" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">Execution Engine</text>
    <text x="1380" y="430" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">Signal → Order</text>
    <text x="1380" y="448" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">partial fills + retry</text>

    <!-- Engine container -->
    <rect x="220" y="40" width="1060" height="800" fill="#FAFBFC" stroke="#C8102E" stroke-width="2" rx="8"/>
    <rect x="220" y="40" width="1060" height="36" fill="#C8102E" rx="8"/>
    <text x="750" y="63" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Tinos">Institutional Trend Following Strategy (ITFS)</text>

    <!-- L1 Gate -->
    <text x="250" y="105" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L1 · REGIME GATE</text>

    <rect x="250" y="115" width="320" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="410" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">RegimeGateFilter</text>
    <text x="410" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">require label == TREND</text>
    <text x="410" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">confidence &gt; 0.65</text>
    <text x="410" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">P(VOLATILE) &lt; 0.20</text>

    <rect x="590" y="115" width="320" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="750" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">TimeframeAlignment</text>
    <text x="750" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">M5 + M15 + H1 trend agree</text>
    <text x="750" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">EMA20 &gt; EMA50 on all TFs (long)</text>
    <text x="750" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">or EMA20 &lt; EMA50 on all TFs (short)</text>

    <rect x="930" y="115" width="320" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1090" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">SessionFilter</text>
    <text x="1090" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">London + NY overlap preferred</text>
    <text x="1090" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">avoid Asia low-liquidity</text>
    <text x="1090" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">news blackout enforced</text>

    <!-- L2 Entry Detection -->
    <text x="250" y="225" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L2 · ENTRY DETECTION (5 institutional patterns)</text>

    <rect x="250" y="235" width="190" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="345" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">E1 · Market Structure</text>
    <text x="345" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">HH-HL (long) / LH-LL (short)</text>
    <text x="345" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">swing detection: 5-bar fractal</text>
    <text x="345" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">BOS = break of structure</text>
    <text x="345" y="320" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">MSS = market structure shift</text>

    <rect x="450" y="235" width="190" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="545" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">E2 · Breakout</text>
    <text x="545" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">close &gt; 20-bar high (long)</text>
    <text x="545" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">volume &gt; 1.5× 20-bar avg</text>
    <text x="545" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ATR expansion confirmation</text>
    <text x="545" y="320" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">avoid false breakout (retest)</text>

    <rect x="650" y="235" width="190" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="745" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">E3 · Pullback</text>
    <text x="745" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">retrace to EMA20 or 0.5 fib</text>
    <text x="745" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">RSI bounces from 40-50</text>
    <text x="745" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">momentum resumes</text>
    <text x="745" y="320" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">higher quality than breakout</text>

    <rect x="850" y="235" width="190" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="945" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">E4 · Liquidity Sweep</text>
    <text x="945" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">wick beyond prior high/low</text>
    <text x="945" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">close back inside range</text>
    <text x="945" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">stop hunt reversal</text>
    <text x="945" y="320" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">high-probability continuation</text>

    <rect x="1050" y="235" width="200" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1150" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">E5 · Order Block / FVG</text>
    <text x="1150" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">OB = last opposite candle</text>
    <text x="1150" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">FVG = 3-candle imbalance</text>
    <text x="1150" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">price returns to OB/FVG</text>
    <text x="1150" y="320" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">institutional re-entry zone</text>

    <!-- L3 Management -->
    <text x="250" y="365" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L3 · TRADE MANAGEMENT</text>

    <rect x="250" y="375" width="320" height="90" fill="#14213D"/>
    <text x="410" y="400" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">BreakEvenManager</text>
    <text x="410" y="420" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">trigger: price moves +1R</text>
    <text x="410" y="434" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">move stop to entry + spread</text>
    <text x="410" y="448" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">lock in zero-loss zone</text>
    <text x="410" y="460" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">eliminate psychological risk</text>

    <rect x="590" y="375" width="320" height="90" fill="#14213D"/>
    <text x="750" y="400" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">PartialCloseManager</text>
    <text x="750" y="420" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">close 50% at +2R</text>
    <text x="750" y="434" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">close 25% at +3R</text>
    <text x="750" y="448" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">runner 25% with trail</text>
    <text x="750" y="460" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">scale out, not all-or-nothing</text>

    <rect x="930" y="375" width="320" height="90" fill="#14213D"/>
    <text x="1090" y="400" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">DynamicTrailingStop</text>
    <text x="1090" y="420" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">ATR-based: 2.5 × ATR(14)</text>
    <text x="1090" y="434" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">tighten as profit grows</text>
    <text x="1090" y="448" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">never widens (ratchet)</text>
    <text x="1090" y="460" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">chandelier exit logic</text>

    <!-- L4 Risk Control -->
    <text x="250" y="495" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L4 · RISK CONTROL</text>

    <rect x="250" y="505" width="490" height="100" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="495" y="530" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">AdaptivePositionSizer</text>
    <text x="495" y="550" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">base_risk = 1.0% equity per trade</text>
    <text x="495" y="564" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">× regime_confidence (0.5–1.0)</text>
    <text x="495" y="578" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">× win_streak_factor (0.8–1.2)</text>
    <text x="495" y="592" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">× vol_regime_factor (ATR percentile)</text>
    <text x="495" y="606" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">qty = (equity × risk%) / (stop_distance × tick_value)</text>

    <rect x="760" y="505" width="490" height="100" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1005" y="530" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">RiskGateClient</text>
    <text x="1005" y="550" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">max concurrent: 3 positions</text>
    <text x="1005" y="564" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">max daily loss: 2% equity</text>
    <text x="1005" y="578" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">correlation check (no DXY hedge)</text>
    <text x="1005" y="592" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">margin floor: 30% free margin</text>
    <text x="1005" y="606" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">news blackout enforced</text>

    <!-- L5 Audit + Observability -->
    <text x="250" y="635" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L5 · AUDIT &amp; OBSERVABILITY</text>

    <rect x="250" y="645" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="410" y="670" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">SignalLogger</text>
    <text x="410" y="688" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">entry conditions + features</text>
    <text x="410" y="702" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">exit reason + R-multiple</text>
    <text x="410" y="716" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">SHAP-style attribution</text>

    <rect x="590" y="645" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="750" y="670" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">PerformanceTracker</text>
    <text x="750" y="688" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">rolling 100-trade stats</text>
    <text x="750" y="702" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">PF, Sharpe, expectancy by pattern</text>
    <text x="750" y="716" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">win streak / loss streak tracking</text>

    <rect x="930" y="645" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1090" y="670" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">AuditEmitter</text>
    <text x="1090" y="688" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ZMQ PUB: trade.opened</text>
    <text x="1090" y="702" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ZMQ PUB: trade.closed</text>
    <text x="1090" y="716" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">hash-chained audit log</text>

    <!-- Arrows -->
    <g stroke="#C8102E" stroke-width="2" fill="none" marker-end="url(#arA)">
      <line x1="180" y1="425" x2="250" y2="155"/>
      <line x1="180" y1="525" x2="250" y2="285"/>
      <line x1="1250" y1="395" x2="1300" y2="425"/>
    </g>

    <g stroke="#14213D" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="3 3">
      <line x1="640" y1="200" x2="640" y2="230"/>
      <line x1="640" y1="340" x2="640" y2="370"/>
      <line x1="640" y1="470" x2="640" y2="500"/>
      <line x1="640" y1="610" x2="640" y2="640"/>
    </g>

    <defs>
      <marker id="arA" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L7,3 z" fill="#C8102E"/>
      </marker>
    </defs>
  </svg>
</div>
