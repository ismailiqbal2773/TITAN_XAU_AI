<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broker Compatibility Engine — Class Diagram &amp; Integration</title>
<style>
  @page { size: 1600px 1100px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1600px; height: 1100px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 26px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">05</span>
    <h1>Class Diagram &amp; TITAN Core Integration</h1>
    <span class="sub">IBrokerProbe interface · 9 detectors · BrokerProfile value object</span>
  </div>

  <svg width="1480" height="850" viewBox="0 0 1480 850">
    <defs>
      <marker id="ar5" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L7,3 z" fill="#14213D"/>
      </marker>
    </defs>

    <!-- ===== CLASS DIAGRAM ===== -->

    <!-- IBrokerProbe interface -->
    <g>
      <rect x="40" y="40" width="320" height="160" fill="#F0FDF4" stroke="#14213D" stroke-width="2"/>
      <rect x="40" y="40" width="320" height="32" fill="#14213D"/>
      <text x="200" y="60" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="JetBrains Mono">«interface» IBrokerProbe</text>
      <text x="50" y="92" font-size="11" font-family="JetBrains Mono">+ symbol_info(): SymbolInfo</text>
      <text x="50" y="110" font-size="11" font-family="JetBrains Mono">+ account_info(): AccountInfo</text>
      <text x="50" y="128" font-size="11" font-family="JetBrains Mono">+ sample_ticks(n: int): Tick[]</text>
      <text x="50" y="146" font-size="11" font-family="JetBrains Mono">+ server_name(): string</text>
      <text x="50" y="164" font-size="11" font-family="JetBrains Mono">+ is_connected(): bool</text>
      <line x1="40" y1="172" x2="360" y2="172" stroke="#14213D"/>
      <text x="50" y="190" font-size="10" font-family="JetBrains Mono" fill="#4A5568">// broker-agnostic probe contract</text>
    </g>

    <!-- MT5Probe -->
    <g>
      <rect x="40" y="240" width="320" height="140" fill="#FEF3F2" stroke="#14213D" stroke-width="2"/>
      <rect x="40" y="240" width="320" height="32" fill="#14213D"/>
      <text x="200" y="260" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="JetBrains Mono">MT5Probe</text>
      <text x="50" y="292" font-size="11" font-family="JetBrains Mono">− terminal: MT5Terminal</text>
      <text x="50" y="310" font-size="11" font-family="JetBrains Mono">− symbol: string</text>
      <line x1="40" y1="318" x2="360" y2="318" stroke="#14213D"/>
      <text x="50" y="336" font-size="11" font-family="JetBrains Mono">+ symbol_info(): SymbolInfo</text>
      <text x="50" y="354" font-size="11" font-family="JetBrains Mono">+ account_info(): AccountInfo</text>
      <text x="50" y="372" font-size="11" font-family="JetBrains Mono"># call_mt5(fn, args): Result</text>
    </g>

    <!-- Inheritance arrow -->
    <g stroke="#14213D" stroke-width="1.5" fill="none">
      <line x1="200" y1="240" x2="200" y2="200"/>
      <polygon points="200,200 192,212 208,212" fill="#ffffff" stroke="#14213D"/>
    </g>

    <!-- BrokerProfile value object (right of IBrokerProbe) -->
    <g>
      <rect x="420" y="40" width="320" height="280" fill="#FEF3F2" stroke="#14213D" stroke-width="2"/>
      <rect x="420" y="40" width="320" height="32" fill="#14213D"/>
      <text x="580" y="60" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="JetBrains Mono">BrokerProfile (value)</text>
      <text x="430" y="92" font-size="11" font-family="JetBrains Mono">+ symbol: string</text>
      <text x="430" y="110" font-size="11" font-family="JetBrains Mono">+ broker_id: BrokerID</text>
      <text x="430" y="128" font-size="11" font-family="JetBrains Mono">+ digits: int {2,3,4,5}</text>
      <text x="430" y="146" font-size="11" font-family="JetBrains Mono">+ point: Decimal</text>
      <text x="430" y="164" font-size="11" font-family="JetBrains Mono">+ contract_size: Decimal</text>
      <text x="430" y="182" font-size="11" font-family="JetBrains Mono">+ tick_size: Decimal</text>
      <text x="430" y="200" font-size="11" font-family="JetBrains Mono">+ tick_value: Decimal</text>
      <text x="430" y="218" font-size="11" font-family="JetBrains Mono">+ leverage: int</text>
      <text x="430" y="236" font-size="11" font-family="JetBrains Mono">+ spread_type: SpreadType</text>
      <text x="430" y="254" font-size="11" font-family="JetBrains Mono">+ commission_type: CommissionType</text>
      <text x="430" y="272" font-size="11" font-family="JetBrains Mono">+ swap_type: SwapType</text>
      <text x="430" y="290" font-size="11" font-family="JetBrains Mono">+ account_type: AccountType</text>
      <text x="430" y="308" font-size="11" font-family="JetBrains Mono">+ detected_at: uint64_t</text>
      <line x1="420" y1="316" x2="740" y2="316" stroke="#14213D"/>
      <text x="430" y="334" font-size="10" font-family="JetBrains Mono" fill="#4A5568">// immutable, hashable</text>
      <text x="430" y="350" font-size="10" font-family="JetBrains Mono" fill="#4A5568">// FlatBuffer serializable</text>
    </g>

    <!-- BrokerProfileLibrary (top right) -->
    <g>
      <rect x="800" y="40" width="280" height="170" fill="#F0FDF4" stroke="#14213D" stroke-width="2"/>
      <rect x="800" y="40" width="280" height="32" fill="#14213D"/>
      <text x="940" y="60" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="JetBrains Mono">BrokerProfileLibrary</text>
      <text x="810" y="92" font-size="11" font-family="JetBrains Mono">− profiles: map&lt;BrokerID, Template&gt;</text>
      <text x="810" y="110" font-size="11" font-family="JetBrains Mono">− regex_map: map&lt;Regex, BrokerID&gt;</text>
      <line x1="800" y1="118" x2="1080" y2="118" stroke="#14213D"/>
      <text x="810" y="138" font-size="11" font-family="JetBrains Mono">+ match(server: string): BrokerID</text>
      <text x="810" y="156" font-size="11" font-family="JetBrains Mono">+ get_template(id): Template</text>
      <text x="810" y="174" font-size="11" font-family="JetBrains Mono">+ deviation(p: Profile): float</text>
      <text x="810" y="192" font-size="11" font-family="JetBrains Mono">+ all_brokers(): BrokerID[]</text>
    </g>

    <!-- BrokerCompatEngine (main orchestrator) -->
    <g>
      <rect x="420" y="400" width="500" height="200" fill="#FEF3F2" stroke="#C8102E" stroke-width="2.5"/>
      <rect x="420" y="400" width="500" height="32" fill="#C8102E"/>
      <text x="670" y="420" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="JetBrains Mono">BrokerCompatEngine</text>
      <text x="430" y="452" font-size="11" font-family="JetBrains Mono">− probe: IBrokerProbe</text>
      <text x="430" y="470" font-size="11" font-family="JetBrains Mono">− detectors: Detector[9]</text>
      <text x="430" y="488" font-size="11" font-family="JetBrains Mono">− validators: Validator[3]</text>
      <text x="430" y="506" font-size="11" font-family="JetBrains Mono">− library: BrokerProfileLibrary</text>
      <text x="430" y="524" font-size="11" font-family="JetBrains Mono">− cache: ProfileCache</text>
      <line x1="420" y1="532" x2="920" y2="532" stroke="#14213D"/>
      <text x="430" y="552" font-size="11" font-family="JetBrains Mono">+ detect_profile(symbol): BrokerProfile</text>
      <text x="430" y="570" font-size="11" font-family="JetBrains Mono">+ invalidate(symbol): void</text>
      <text x="430" y="588" font-size="11" font-family="JetBrains Mono"># run_detectors(): PropertyMap</text>
      <text x="430" y="606" font-size="11" font-family="JetBrains Mono"># run_validators(props): ValidationResult</text>
    </g>

    <!-- IDetector interface -->
    <g>
      <rect x="1000" y="400" width="280" height="120" fill="#F0FDF4" stroke="#14213D" stroke-width="2"/>
      <rect x="1000" y="400" width="280" height="32" fill="#14213D"/>
      <text x="1140" y="420" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="JetBrains Mono">«interface» IDetector</text>
      <text x="1010" y="452" font-size="11" font-family="JetBrains Mono">+ detect(probe: IBrokerProbe):</text>
      <text x="1024" y="470" font-size="11" font-family="JetBrains Mono">PropertyResult</text>
      <line x1="1000" y1="478" x2="1280" y2="478" stroke="#14213D"/>
      <text x="1010" y="498" font-size="10" font-family="JetBrains Mono" fill="#4A5568">// 9 concrete impls</text>
      <text x="1010" y="514" font-size="9" font-family="JetBrains Mono" fill="#4A5568">DigitsDetector, ContractSizeDetector,</text>
    </g>

    <!-- 9 detectors listed -->
    <g>
      <rect x="1000" y="540" width="280" height="220" fill="#F8FAFC" stroke="#14213D"/>
      <text x="1140" y="560" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">9 Concrete Detectors</text>
      <text x="1010" y="582" font-size="10" font-family="JetBrains Mono">• DigitsDetector</text>
      <text x="1010" y="600" font-size="10" font-family="JetBrains Mono">• ContractSizeDetector</text>
      <text x="1010" y="618" font-size="10" font-family="JetBrains Mono">• TickSizeDetector</text>
      <text x="1010" y="636" font-size="10" font-family="JetBrains Mono">• TickValueDetector</text>
      <text x="1010" y="654" font-size="10" font-family="JetBrains Mono">• LeverageDetector</text>
      <text x="1010" y="672" font-size="10" font-family="JetBrains Mono">• SpreadTypeDetector</text>
      <text x="1010" y="690" font-size="10" font-family="JetBrains Mono">• CommissionDetector</text>
      <text x="1010" y="708" font-size="10" font-family="JetBrains Mono">• SwapTypeDetector</text>
      <text x="1010" y="726" font-size="10" font-family="JetBrains Mono">• AccountClassifier</text>
      <text x="1010" y="744" font-size="10" font-family="JetBrains Mono">• BrokerFingerprinter</text>
    </g>

    <!-- IValidator -->
    <g>
      <rect x="1000" y="780" width="280" height="60" fill="#F0FDF4" stroke="#14213D" stroke-width="2"/>
      <rect x="1000" y="780" width="280" height="28" fill="#14213D"/>
      <text x="1140" y="800" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="JetBrains Mono">«interface» IValidator</text>
      <text x="1010" y="824" font-size="10" font-family="JetBrains Mono">+ validate(props, profile): ValidationResult</text>
    </g>

    <!-- Compositions -->
    <g stroke="#14213D" stroke-width="1" fill="none">
      <line x1="920" y1="500" x2="1000" y2="460"/>
      <polygon points="1000,460 988,466 988,454" fill="#14213D"/>

      <line x1="920" y1="580" x2="1000" y2="800"/>
      <polygon points="1000,800 988,794 988,806" fill="#14213D"/>
      <text x="945" y="700" font-size="9" font-family="JetBrains Mono">3</text>

      <line x1="800" y1="125" x2="740" y2="180"/>
      <polygon points="740,180 746,168 734,168" fill="#14213D"/>
    </g>

    <!-- Engine ↔ Probe composition -->
    <g stroke="#14213D" stroke-width="1" fill="none">
      <line x1="420" y1="460" x2="360" y2="120"/>
      <polygon points="360,120 372,126 372,114" fill="#14213D"/>
      <text x="380" y="290" font-size="9" font-family="JetBrains Mono">1</text>
    </g>

    <!-- ===== INTEGRATION DIAGRAM (bottom) ===== -->
    <g transform="translate(0, 640)">
      <text x="40" y="0" font-size="14" font-weight="700" fill="#C8102E" font-family="Tinos">Integration with TITAN Core</text>

      <rect x="40" y="20" width="220" height="80" fill="#14213D"/>
      <text x="150" y="50" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">TITAN Core (Risk Gate)</text>
      <text x="150" y="68" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">subscribes bce.profile.ready</text>
      <text x="150" y="84" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">uses profile for size calc</text>

      <rect x="40" y="120" width="220" height="60" fill="#F8FAFC" stroke="#14213D"/>

      <text x="150" y="160" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">uses contract_size, tick_size</text>

      <rect x="40" y="200" width="220" height="60" fill="#F8FAFC" stroke="#14213D"/>
      <text x="150" y="222" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">StrategyCoordinator</text>
      <text x="150" y="240" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">uses account_type for sizing</text>

      <!-- Engine -->
      <rect x="380" y="80" width="320" height="120" fill="#C8102E"/>
      <text x="540" y="110" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Tinos">BrokerCompatEngine</text>
      <text x="540" y="130" text-anchor="middle" fill="#ffffff" opacity="0.9" font-size="10" font-family="JetBrains Mono">+ detect_profile(symbol)</text>
      <text x="540" y="146" text-anchor="middle" fill="#ffffff" opacity="0.9" font-size="10" font-family="JetBrains Mono">+ invalidate(symbol)</text>
      <text x="540" y="162" text-anchor="middle" fill="#ffffff" opacity="0.9" font-size="10" font-family="JetBrains Mono">+ get_profile(symbol) [cached]</text>
      <text x="540" y="184" text-anchor="middle" fill="#ffffff" font-size="9" font-family="JetBrains Mono">ZMQ PUB: bce.profile.ready</text>

      <!-- Infra -->
      <rect x="820" y="20" width="200" height="60" fill="#F0FDF4" stroke="#14213D"/>

      <text x="920" y="60" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">TTL 24h</text>

      <rect x="820" y="100" width="200" height="60" fill="#F0FDF4" stroke="#14213D"/>
      <text x="920" y="122" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">Audit Store (WORM)</text>
      <text x="920" y="140" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">hash-chained log</text>

      <rect x="820" y="180" width="200" height="60" fill="#F0FDF4" stroke="#14213D"/>
      <text x="920" y="202" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">MT5 Bridge</text>
      <text x="920" y="220" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">MetaTrader5 package</text>

      <rect x="1080" y="100" width="200" height="60" fill="#F8FAFC" stroke="#14213D"/>
      <text x="1180" y="122" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">Operator Console</text>
      <text x="1180" y="140" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">invalidate · re-probe</text>

      <!-- arrows -->
      <g stroke="#C8102E" stroke-width="2" fill="none" marker-end="url(#ar5)">
        <line x1="260" y1="60" x2="380" y2="120"/>
