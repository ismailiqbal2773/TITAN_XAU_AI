<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broker Compatibility Engine — Property Detection State Machines</title>
<style>
  @page { size: 1600px 1100px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1600px; height: 1100px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 26px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">03</span>
    <h1>Per-Property Detection State Machines</h1>
    <span class="sub">9 properties · each with explicit states &amp; transitions</span>
  </div>

  <svg width="1480" height="850" viewBox="0 0 1480 850">
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L7,3 z" fill="#14213D"/>
      </marker>
      <marker id="arrR" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L7,3 z" fill="#C8102E"/>
      </marker>
    </defs>

    <!-- (a) Digits/Point SM -->
    <g>
      <text x="40" y="30" font-size="14" font-weight="700" fill="#C8102E" font-family="Tinos">(a) Digits &amp; Point Detection</text>
      <ellipse cx="100" cy="80" rx="40" ry="20" fill="#14213D"/>
      <text x="100" y="86" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">INIT</text>
      <line x1="140" y1="80" x2="180" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="180" y="60" width="160" height="40" fill="#F0FDF4" stroke="#14213D"/>
      <text x="260" y="78" text-anchor="middle" font-size="10" font-weight="700" font-family="Tinos">FETCH symbol_info</text>
      <text x="260" y="92" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">digits, point</text>
      <line x1="340" y1="80" x2="380" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <polygon points="380,80 420,55 460,80 420,105" fill="#F0FDF4" stroke="#14213D"/>
      <text x="420" y="78" text-anchor="middle" font-size="9" font-weight="700">digits</text>
      <text x="420" y="92" text-anchor="middle" font-size="9" font-weight="700">∈ {2,3,4,5}?</text>
      <line x1="460" y1="80" x2="500" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="475" y="74" font-size="9" fill="#15803D">YES</text>

      <rect x="500" y="60" width="160" height="40" fill="#14213D"/>
      <text x="580" y="78" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">VERIFY point == 10^-digits</text>
      <text x="580" y="92" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">e.g. 5 digits → 1e-5</text>
      <line x1="660" y1="80" x2="700" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <ellipse cx="740" cy="80" rx="40" ry="20" fill="#15803D"/>
      <text x="740" y="86" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">DONE</text>

      <!-- error path -->
      <line x1="420" y1="105" x2="420" y2="135" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrR)"/>
      <text x="430" y="125" font-size="9" fill="#C8102E">NO</text>
      <rect x="350" y="135" width="140" height="50" fill="#FEF3F2" stroke="#C8102E"/>
      <text x="420" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#C8102E" font-family="Tinos">HARD ERROR</text>
      <text x="420" y="170" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">unsupported digits</text>
      <text x="420" y="180" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">block symbol</text>
    </g>

    <!-- (b) Tick size / tick value SM -->
    <g transform="translate(0, 230)">
      <text x="40" y="30" font-size="14" font-weight="700" fill="#C8102E" font-family="Tinos">(b) Tick Size &amp; Tick Value Detection</text>
      <ellipse cx="100" cy="80" rx="40" ry="20" fill="#14213D"/>
      <text x="100" y="86" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">INIT</text>
      <line x1="140" y1="80" x2="180" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="180" y="60" width="160" height="40" fill="#F0FDF4" stroke="#14213D"/>
      <text x="260" y="78" text-anchor="middle" font-size="10" font-weight="700" font-family="Tinos">FETCH tick_size, tick_value</text>
      <text x="260" y="92" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">trade_tick_size/value</text>
      <line x1="340" y1="80" x2="380" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <polygon points="380,80 420,55 460,80 420,105" fill="#F0FDF4" stroke="#14213D"/>
      <text x="420" y="76" text-anchor="middle" font-size="9" font-weight="700">tick_size</text>
      <text x="420" y="90" text-anchor="middle" font-size="9" font-weight="700">&gt; 0?</text>
      <line x1="460" y1="80" x2="500" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="475" y="74" font-size="9" fill="#15803D">YES</text>

      <rect x="500" y="60" width="220" height="40" fill="#14213D"/>
      <text x="610" y="78" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">VERIFY tick_value ≈ tick_size × cs × price</text>
      <text x="610" y="92" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">tolerance 5%</text>
      <line x1="720" y1="80" x2="760" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <ellipse cx="800" cy="80" rx="40" ry="20" fill="#15803D"/>
      <text x="800" y="86" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">DONE</text>

      <!-- error paths -->
      <line x1="420" y1="105" x2="420" y2="135" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrR)"/>
      <text x="430" y="125" font-size="9" fill="#C8102E">NO</text>
      <rect x="350" y="135" width="160" height="50" fill="#FEF3F2" stroke="#C8102E"/>
      <text x="430" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#C8102E" font-family="Tinos">FALLBACK</text>
      <text x="430" y="170" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">tick_size = point</text>
      <text x="430" y="180" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">tick_value computed</text>

      <!-- tolerance fail -->
      <line x1="610" y1="100" x2="610" y2="135" stroke="#B45309" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 2"/>
      <rect x="540" y="135" width="160" height="50" fill="#FEFBEB" stroke="#B45309"/>
      <text x="620" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#B45309" font-family="Tinos">WARN</text>
      <text x="620" y="170" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">mismatch &gt;5% — log</text>
      <text x="620" y="180" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">use broker-reported</text>
    </g>

    <!-- (c) Spread type SM -->
    <g transform="translate(820, 0)">
      <text x="40" y="30" font-size="14" font-weight="700" fill="#C8102E" font-family="Tinos">(c) Spread Type Detection</text>
      <ellipse cx="100" cy="80" rx="40" ry="20" fill="#14213D"/>
      <text x="100" y="86" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">INIT</text>
      <line x1="140" y1="80" x2="180" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="180" y="60" width="180" height="40" fill="#F0FDF4" stroke="#14213D"/>
      <text x="270" y="78" text-anchor="middle" font-size="10" font-weight="700" font-family="Tinos">SAMPLE 1000 spreads</text>
      <text x="270" y="92" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">spread = ask - bid</text>
      <line x1="360" y1="80" x2="400" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="400" y="60" width="180" height="40" fill="#F0FDF4" stroke="#14213D"/>
      <text x="490" y="78" text-anchor="middle" font-size="10" font-weight="700" font-family="Tinos">COMPUTE stddev</text>
      <text x="490" y="92" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">μ, σ over window</text>
      <line x1="580" y1="80" x2="620" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <polygon points="620,80 670,50 720,80 670,110" fill="#F0FDF4" stroke="#14213D"/>
      <text x="670" y="76" text-anchor="middle" font-size="9" font-weight="700">σ / μ</text>
      <text x="670" y="90" text-anchor="middle" font-size="9" font-weight="700">&lt; 0.05?</text>

      <line x1="720" y1="80" x2="760" y2="60" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="745" y="55" font-size="9" fill="#15803D">YES</text>
      <rect x="760" y="40" width="100" height="40" fill="#14213D"/>
      <text x="810" y="58" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">FIXED</text>
      <text x="810" y="72" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">±2%</text>

      <line x1="720" y1="80" x2="760" y2="100" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="745" y="115" font-size="9" fill="#4A5568">NO</text>
      <rect x="760" y="100" width="100" height="40" fill="#14213D"/>
      <text x="810" y="118" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">VARIABLE</text>
      <text x="810" y="132" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">μ, σ reported</text>
    </g>

    <!-- (d) Commission type SM -->
    <g transform="translate(820, 230)">
      <text x="40" y="30" font-size="14" font-weight="700" fill="#C8102E" font-family="Tinos">(d) Commission Type Detection</text>
      <ellipse cx="100" cy="80" rx="40" ry="20" fill="#14213D"/>
      <text x="100" y="86" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">INIT</text>
      <line x1="140" y1="80" x2="180" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="180" y="60" width="160" height="40" fill="#F0FDF4" stroke="#14213D"/>
      <text x="260" y="78" text-anchor="middle" font-size="10" font-weight="700" font-family="Tinos">FETCH commission_rate</text>
      <text x="260" y="92" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">account_info.commission</text>
      <line x1="340" y1="80" x2="380" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <polygon points="380,80 420,50 460,80 420,110" fill="#F0FDF4" stroke="#14213D"/>
      <text x="420" y="76" text-anchor="middle" font-size="9" font-weight="700">rate</text>
      <text x="420" y="90" text-anchor="middle" font-size="9" font-weight="700">== 0?</text>
      <line x1="460" y1="80" x2="500" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="475" y="74" font-size="9" fill="#15803D">NO</text>

      <polygon points="500,80 555,50 610,80 555,110" fill="#F0FDF4" stroke="#14213D"/>
      <text x="555" y="76" text-anchor="middle" font-size="9" font-weight="700">magnitude</text>
      <text x="555" y="90" text-anchor="middle" font-size="9" font-weight="700">vs contract</text>

      <line x1="610" y1="80" x2="650" y2="50" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="625" y="45" font-size="8" fill="#4A5568">&lt;1</text>
      <rect x="650" y="30" width="120" height="40" fill="#14213D"/>
      <text x="710" y="48" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">PER_MILLION</text>
      <text x="710" y="62" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">$ per $1M notional</text>

      <line x1="610" y1="80" x2="650" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="625" y="74" font-size="8" fill="#4A5568">1-50</text>
      <rect x="650" y="60" width="120" height="40" fill="#14213D"/>
      <text x="710" y="78" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">PER_LOT</text>
      <text x="710" y="92" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">$ per standard lot</text>

      <line x1="610" y1="80" x2="650" y2="110" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="625" y="120" font-size="8" fill="#4A5568">&lt;0.001</text>
      <rect x="650" y="100" width="120" height="40" fill="#14213D"/>
      <text x="710" y="118" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">PCT</text>
      <text x="710" y="132" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">% of notional</text>

      <!-- zero branch -->
      <line x1="420" y1="110" x2="420" y2="140" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="430" y="130" font-size="9" fill="#15803D">YES</text>
      <rect x="370" y="140" width="100" height="40" fill="#14213D"/>
      <text x="420" y="158" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">NONE</text>
      <text x="420" y="172" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">mark-up only</text>
    </g>

    <!-- (e) Account classifier -->
    <g transform="translate(0, 460)">
      <text x="40" y="30" font-size="14" font-weight="700" fill="#C8102E" font-family="Tinos">(e) Account Type Classifier (CENT / MICRO / DOLLAR / RAW)</text>

      <ellipse cx="100" cy="80" rx="40" ry="20" fill="#14213D"/>
      <text x="100" y="86" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">INIT</text>
      <line x1="140" y1="80" x2="180" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="180" y="60" width="200" height="40" fill="#F0FDF4" stroke="#14213D"/>
      <text x="280" y="78" text-anchor="middle" font-size="10" font-weight="700" font-family="Tinos">FETCH balance, equity, currency</text>
      <text x="280" y="92" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">account_info()</text>
      <line x1="380" y1="80" x2="420" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <polygon points="420,80 480,40 540,80 480,120" fill="#F0FDF4" stroke="#14213D"/>
      <text x="480" y="76" text-anchor="middle" font-size="9" font-weight="700">balance</text>
      <text x="480" y="90" text-anchor="middle" font-size="9" font-weight="700">&gt;= 10000?</text>

      <line x1="540" y1="80" x2="580" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="555" y="74" font-size="9" fill="#15803D">YES</text>

      <polygon points="580,80 640,50 700,80 640,110" fill="#F0FDF4" stroke="#14213D"/>
      <text x="640" y="76" text-anchor="middle" font-size="9" font-weight="700">server_name</text>
      <text x="640" y="90" text-anchor="middle" font-size="9" font-weight="700">contains "raw"?</text>

      <line x1="700" y1="80" x2="740" y2="60" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="720" y="55" font-size="9" fill="#15803D">YES</text>
      <rect x="740" y="40" width="120" height="40" fill="#14213D"/>
      <text x="800" y="58" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">RAW / DOLLAR</text>
      <text x="800" y="72" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">ECN spread + comm</text>

      <line x1="700" y1="80" x2="740" y2="100" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="720" y="115" font-size="9" fill="#4A5568">NO</text>
      <rect x="740" y="100" width="120" height="40" fill="#14213D"/>
      <text x="800" y="118" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">DOLLAR</text>
      <text x="800" y="132" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">standard account</text>

      <!-- low balance branch -->
      <line x1="480" y1="120" x2="480" y2="160" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="490" y="150" font-size="9" fill="#4A5568">NO</text>

      <polygon points="480,160 540,140 600,160 540,180" fill="#F0FDF4" stroke="#14213D"/>
      <text x="540" y="158" text-anchor="middle" font-size="9" font-weight="700">balance</text>
      <text x="540" y="172" text-anchor="middle" font-size="9" font-weight="700">&gt;= 100?</text>

      <line x1="600" y1="160" x2="640" y2="160" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="615" y="154" font-size="9" fill="#15803D">YES</text>
      <rect x="640" y="140" width="120" height="40" fill="#14213D"/>
      <text x="700" y="158" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">MICRO</text>
      <text x="700" y="172" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">0.01 lot min</text>

      <line x1="540" y1="180" x2="540" y2="210" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="550" y="200" font-size="9" fill="#4A5568">NO</text>
      <rect x="480" y="210" width="120" height="40" fill="#14213D"/>
      <text x="540" y="228" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">CENT</text>
      <text x="540" y="242" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">balance in cents</text>
    </g>

    <!-- (f) Broker fingerprinter -->
    <g transform="translate(820, 460)">
      <text x="40" y="30" font-size="14" font-weight="700" fill="#C8102E" font-family="Tinos">(f) Broker Fingerprinter</text>
      <ellipse cx="100" cy="80" rx="40" ry="20" fill="#14213D"/>
      <text x="100" y="86" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">INIT</text>
      <line x1="140" y1="80" x2="180" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="180" y="60" width="180" height="40" fill="#F0FDF4" stroke="#14213D"/>
      <text x="270" y="78" text-anchor="middle" font-size="10" font-weight="700" font-family="Tinos">FETCH server_name</text>
      <text x="270" y="92" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">account_info_server</text>
      <line x1="360" y1="80" x2="400" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="400" y="60" width="180" height="40" fill="#F0FDF4" stroke="#14213D"/>
      <text x="490" y="78" text-anchor="middle" font-size="10" font-weight="700" font-family="Tinos">REGEX MATCH (6 brokers)</text>
      <text x="490" y="92" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">case-insensitive</text>
      <line x1="580" y1="80" x2="620" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>

      <polygon points="620,80 670,50 720,80 670,110" fill="#F0FDF4" stroke="#14213D"/>
      <text x="670" y="76" text-anchor="middle" font-size="9" font-weight="700">any</text>
      <text x="670" y="90" text-anchor="middle" font-size="9" font-weight="700">matched?</text>

      <line x1="720" y1="80" x2="760" y2="80" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="740" y="74" font-size="9" fill="#15803D">YES</text>
      <rect x="760" y="60" width="160" height="40" fill="#14213D"/>
      <text x="840" y="78" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">BROKER IDENTIFIED</text>
      <text x="840" y="92" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">load profile template</text>

      <line x1="670" y1="110" x2="670" y2="140" stroke="#14213D" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="680" y="130" font-size="9" fill="#4A5568">NO</text>
