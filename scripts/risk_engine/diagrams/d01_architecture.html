<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Institutional Risk Engine — Architecture</title>
<style>
  @page { size: 1600px 1100px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1600px; height: 1100px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 28px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">01</span>
    <h1>Institutional Risk Engine — Internal Architecture (5 Layers)</h1>
    <span class="sub">Mode · Pre-Trade · Post-Trade · Emergency · Capital Preservation</span>
  </div>

  <svg width="1480" height="850" viewBox="0 0 1480 850">
    <rect x="20" y="380" width="160" height="90" fill="#F8FAFC" stroke="#14213D" stroke-width="1.5"/>
    <text x="100" y="410" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">Signal Source</text>
    <text x="100" y="430" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Strategy + AI signals</text>
    <text x="100" y="448" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">direction + size + SL</text>

    <rect x="1300" y="380" width="160" height="90" fill="#14213D"/>
    <text x="1380" y="410" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">Execution Engine</text>
    <text x="1380" y="430" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">approved / rejected</text>
    <text x="1380" y="448" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">+ throttle / halt</text>

    <rect x="220" y="40" width="1060" height="800" fill="#FAFBFC" stroke="#C8102E" stroke-width="2" rx="8"/>
    <rect x="220" y="40" width="1060" height="36" fill="#C8102E" rx="8"/>
    <text x="750" y="63" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Tinos">Institutional Risk Engine (IRE)</text>

    <!-- L1 Mode -->
    <text x="250" y="105" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L1 · RISK MODE SELECTOR</text>
    <rect x="250" y="115" width="490" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="495" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">RiskModeManager</text>
    <text x="495" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Conservative · Balanced · Aggressive · Competition</text>
    <text x="495" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">loaded at startup · swappable by operator (supervisor auth)</text>
    <text x="495" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">auto-degrade to Conservative on any circuit breaker</text>

    <rect x="760" y="115" width="490" height="80" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1005" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E" font-family="Tinos">RiskParameterProvider</text>
    <text x="1005" y="158" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">per-mode: risk_per_trade, max_DD, max_trades, max_exposure</text>
    <text x="1005" y="172" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">immutable during session · versioned in config</text>
    <text x="1005" y="186" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">audit-logged on every parameter access</text>

    <!-- L2 Pre-Trade -->
    <text x="250" y="225" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L2 · PRE-TRADE RISK GATE (synchronous veto · &lt;0.3ms)</text>
    <rect x="250" y="235" width="320" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="410" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">PositionSizeValidator</text>
    <text x="410" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">risk_per_trade &lt;= mode limit</text>
    <text x="410" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">qty &lt;= max_exposure - current</text>
    <text x="410" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">leverage &lt;= broker max</text>
    <text x="410" y="324" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">REJECT if any check fails</text>

    <rect x="590" y="235" width="320" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="750" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">ConcurrencyValidator</text>
    <text x="750" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">open_trades &lt; max_open_trades</text>
    <text x="750" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">no duplicate symbol+direction</text>
    <text x="750" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">correlation check (no DXY hedge)</text>
    <text x="750" y="324" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">session + news blackout check</text>

    <rect x="930" y="235" width="320" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1090" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">MarginValidator</text>
    <text x="1090" y="278" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">free_margin &gt;= margin_floor</text>
    <text x="1090" y="292" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">post-trade margin &gt; floor</text>
    <text x="1090" y="306" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">margin call proximity alert</text>
    <text x="1090" y="324" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">floor: 30% (Cons) · 25% (Aggr)</text>

    <!-- L3 Post-Trade -->
    <text x="250" y="365" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L3 · POST-TRADE RISK MONITOR (async · continuous)</text>
    <rect x="250" y="375" width="320" height="100" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="410" y="398" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">DailyDDMonitor</text>
    <text x="410" y="418" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">equity peak vs current (UTC day)</text>
    <text x="410" y="432" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">soft at 1.5% · hard at 2.0% (Cons)</text>
    <text x="410" y="446" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">action: throttle → halt → flatten</text>
    <text x="410" y="464" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">resets at 00:00 UTC</text>

    <rect x="590" y="375" width="320" height="100" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="750" y="398" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">WeeklyDDMonitor</text>
    <text x="750" y="418" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">equity peak vs current (7-day rolling)</text>
    <text x="750" y="432" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">soft at 3% · hard at 4% (Cons)</text>
    <text x="750" y="446" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">action: reduce size 50% → halt</text>
    <text x="750" y="464" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">rolling window, no reset</text>

    <rect x="930" y="375" width="320" height="100" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1090" y="398" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">MonthlyDDMonitor</text>
    <text x="1090" y="418" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">equity peak vs current (30-day rolling)</text>
    <text x="1090" y="432" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">soft at 4% · hard at 5% (Cons)</text>
    <text x="1090" y="446" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">action: halt + operator page P1</text>
    <text x="1090" y="464" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">rolling window, no reset</text>

    <!-- L4 Emergency -->
    <text x="250" y="505" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L4 · EMERGENCY SHUTDOWN (kill switch · &lt;500ms end-to-end)</text>
    <rect x="250" y="515" width="490" height="90" fill="#14213D"/>
    <text x="495" y="540" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">KillSwitchController</text>
    <text x="495" y="560" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">halt new orders → cancel pending → flatten all → notify</text>
    <text x="495" y="575" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">triggers: hard DD · manual operator · license revoke</text>
    <text x="495" y="589" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">cooldown: 5 min before re-arm · supervisor auth required</text>
    <text x="495" y="601" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">atomic flag · dedicated reverse signal bus (not main bus)</text>

    <rect x="760" y="515" width="490" height="90" fill="#14213D"/>
    <text x="1005" y="540" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">CircuitBreakerManager</text>
    <text x="1005" y="560" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">3-tier: soft (throttle) → hard (halt) → critical (flatten)</text>
    <text x="1005" y="575" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">soft: reduce size 50% · hard: no new entries · critical: flatten</text>
    <text x="1005" y="589" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">auto-degrade mode to Conservative on any hard breaker</text>
    <text x="1005" y="601" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">breaker state: NORMAL → THROTTLED → HALTED → FLATTENED</text>

    <!-- L5 Capital Preservation -->
    <text x="250" y="635" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L5 · CAPITAL PRESERVATION (proactive · long-term survival)</text>
    <rect x="250" y="645" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="410" y="668" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">LossStreakManager</text>
    <text x="410" y="686" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">3 losses → size × 0.5</text>
    <text x="410" y="700" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">5 losses → halt for session</text>
    <text x="410" y="714" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">reset on any win</text>

    <rect x="590" y="645" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="750" y="668" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">EquityGuardRail</text>
    <text x="750" y="686" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">equity &lt; 90% start → Conservative</text>
    <text x="750" y="700" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">equity &lt; 85% start → halt</text>
    <text x="750" y="714" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">equity &lt; 80% start → flatten + lock</text>

    <rect x="930" y="645" width="320" height="80" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1090" y="668" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">VolatilityThrottle</text>
    <text x="1090" y="686" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ATR pct &gt; 80 → size × 0.5</text>
    <text x="1090" y="700" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ATR pct &gt; 95 → no new entries</text>
    <text x="1090" y="714" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">news blackout enforcement</text>

    <!-- Audit + Observability -->
    <text x="250" y="760" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L6 · AUDIT &amp; OBSERVABILITY</text>
    <rect x="250" y="770" width="320" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="410" y="793" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">RiskAuditLogger</text>
    <text x="410" y="810" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">every decision · every breaker · hash-chained</text>
    <text x="410" y="822" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">WORM S3 · immutable</text>

    <rect x="590" y="770" width="320" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="750" y="793" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">RiskMetricsExporter</text>
    <text x="750" y="810" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">DD · exposure · open trades · mode</text>
    <text x="750" y="822" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Prometheus · 15s scrape</text>

    <rect x="930" y="770" width="320" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1090" y="793" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">RiskDashboardEmitter</text>
    <text x="1090" y="810" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ZMQ PUB: risk.state</text>
    <text x="1090" y="822" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">operator console real-time</text>

    <g stroke="#C8102E" stroke-width="2" fill="none" marker-end="url(#arA)">
      <line x1="180" y1="425" x2="250" y2="155"/>
      <line x1="1250" y1="285" x2="1300" y2="425"/>
    </g>
    <defs><marker id="arA" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#C8102E"/></marker></defs>
  </svg>
</div>
</body>
</html>
