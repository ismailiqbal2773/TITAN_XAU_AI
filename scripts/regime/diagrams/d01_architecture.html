<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adaptive Regime Detection System — Architecture</title>
<style>
  @page { size: 1600px 1100px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Tinos','FreeSerif',serif; color: #14213D; }
  .canvas { width: 1600px; height: 1100px; padding: 50px 60px; box-sizing: border-box; }
  .title-bar { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid #14213D; padding-bottom: 12px; margin-bottom: 24px; }
  .title-bar .num { font-size: 48px; font-weight: 900; color: #C8102E; line-height: 1; }
  .title-bar h1 { font-size: 28px; font-weight: 700; margin: 0; }
  .title-bar .sub { font-size: 13px; color: #4A5568; margin-left: auto; font-family: 'JetBrains Mono',monospace; }
  svg { display: block; margin: 0 auto; background: #FAFBFC; border: 1px solid #E2E8F0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <span class="num">01</span>
    <h1>Regime Detection System — Internal Architecture (5 Layers)</h1>
    <span class="sub">Ingest · Feature Engineering · Model · Scoring · Publication</span>
  </div>

  <svg width="1480" height="850" viewBox="0 0 1480 850">
    <!-- External inputs -->
    <rect x="20" y="380" width="180" height="90" fill="#F8FAFC" stroke="#14213D" stroke-width="1.5"/>
    <text x="110" y="410" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">Market Data</text>
    <text x="110" y="430" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">ticks + bars</text>
    <text x="110" y="448" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">M1/M5/M15/H1</text>

    <rect x="20" y="500" width="180" height="70" fill="#F8FAFC" stroke="#14213D" stroke-width="1.5"/>
    <text x="110" y="525" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">News Feed</text>
    <text x="110" y="543" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">FOMC · NFP · CPI</text>
    <text x="110" y="557" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">sentiment scores</text>

    <!-- External consumer -->
    <rect x="1280" y="380" width="180" height="90" fill="#14213D"/>
    <text x="1370" y="410" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">Strategy Coordinator</text>
    <text x="1370" y="430" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">regime-gated dispatch</text>
    <text x="1370" y="448" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">3 strategies</text>

    <!-- Engine container -->
    <rect x="240" y="40" width="1020" height="800" fill="#FAFBFC" stroke="#C8102E" stroke-width="2" rx="8"/>
    <rect x="240" y="40" width="1020" height="36" fill="#C8102E" rx="8"/>
    <text x="750" y="63" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Tinos">Adaptive Regime Detection System (ARDS)</text>

    <!-- L1 Ingest -->
    <text x="260" y="100" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L1 · INGEST</text>

    <rect x="260" y="110" width="220" height="80" fill="#FEF3F2" stroke="#14213D"/>
    <text x="370" y="135" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">BarAggregator</text>
    <text x="370" y="153" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">M1/M5/M15/H1 OHLCV</text>
    <text x="370" y="167" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">streaming, ring buffer</text>
    <text x="370" y="181" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">100k bars per timeframe</text>

    <rect x="500" y="110" width="220" height="80" fill="#FEF3F2" stroke="#14213D"/>
    <text x="610" y="135" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">TickBuffer</text>
    <text x="610" y="153" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">1M tick ring buffer</text>
    <text x="610" y="167" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">bid/ask/vol/ts</text>
    <text x="610" y="181" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">for intrabar features</text>

    <rect x="740" y="110" width="220" height="80" fill="#FEF3F2" stroke="#14213D"/>
    <text x="850" y="135" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">NewsEventBuffer</text>
    <text x="850" y="153" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">scheduled events ±24h</text>
    <text x="850" y="167" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">impact tier (H/M/L)</text>
    <text x="850" y="181" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">actual vs forecast</text>

    <rect x="980" y="110" width="260" height="80" fill="#FEF3F2" stroke="#14213D"/>
    <text x="1110" y="135" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">SessionCalendar</text>
    <text x="1110" y="153" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Asia / EU / US / overlap</text>
    <text x="1110" y="167" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">rollover windows</text>
    <text x="1110" y="181" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">holiday calendar</text>

    <!-- L2 Feature Engineering -->
    <text x="260" y="220" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L2 · FEATURE ENGINEERING (7 features)</text>

    <rect x="260" y="230" width="160" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="340" y="252" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">ADXEngine</text>
    <text x="340" y="268" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">14-period · +DI / -DI</text>
    <text x="340" y="281" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">trend strength</text>

    <rect x="430" y="230" width="160" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="510" y="252" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">ATREngine</text>
    <text x="510" y="268" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">14-period · vol units</text>
    <text x="510" y="281" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">normalized by price</text>

    <rect x="600" y="230" width="160" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="680" y="252" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">EMASlopeEngine</text>
    <text x="680" y="268" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">EMA(20) · angle in rad</text>
    <text x="680" y="281" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">trend direction</text>

    <rect x="770" y="230" width="160" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="850" y="252" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">HurstExponentEngine</text>
    <text x="850" y="268" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">R/S · 100-bar window</text>
    <text x="850" y="281" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">persistent vs MR</text>

    <rect x="940" y="230" width="160" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1020" y="252" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">BollingerWidthEngine</text>
    <text x="1020" y="268" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">20-period · 2σ</text>
    <text x="1020" y="281" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">volatility expansion</text>

    <rect x="1110" y="230" width="140" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1180" y="252" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">RealizedVolEngine</text>
    <text x="1180" y="268" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">30-bar log-return σ</text>
    <text x="1180" y="281" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">annualized</text>

    <!-- L2 second row: Volume + News -->
    <rect x="260" y="300" width="320" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="420" y="322" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">VolumeAnalyzer</text>
    <text x="420" y="338" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">tick vol + OBV + VWAP deviation</text>
    <text x="420" y="351" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">volume spike z-score</text>

    <rect x="600" y="300" width="320" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="760" y="322" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">NewsSentimentEngine</text>
    <text x="760" y="338" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">event proximity (min to event)</text>
    <text x="760" y="351" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">sentiment score + surprise factor</text>

    <rect x="940" y="300" width="310" height="60" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1095" y="322" text-anchor="middle" font-size="11" font-weight="700" font-family="Tinos">FeatureNormalizer</text>
    <text x="1095" y="338" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">rolling z-score · winsorize 1%</text>
    <text x="1095" y="351" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">per-session recompute</text>

    <!-- L3 Model -->
    <text x="260" y="390" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L3 · MODEL (ensemble: HMM + Gradient Boost + Rules)</text>

    <rect x="260" y="400" width="310" height="100" fill="#14213D"/>
    <text x="415" y="425" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">HMM Layer</text>
    <text x="415" y="445" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">3-state Gaussian HMM</text>
    <text x="415" y="460" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">states: trend / range / volatile</text>
    <text x="415" y="473" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">EM-trained per session</text>
    <text x="415" y="486" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">Viterbi decode · posterior probs</text>

    <rect x="590" y="400" width="310" height="100" fill="#14213D"/>
    <text x="745" y="425" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">Gradient Boost Layer</text>
    <text x="745" y="445" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">LightGBM · 4-class softmax</text>
    <text x="745" y="460" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">500 trees · max_depth=6</text>
    <text x="745" y="473" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">features: 7 engineered + 3 derived</text>
    <text x="745" y="486" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">SHAP explainability per inference</text>

    <rect x="920" y="400" width="310" height="100" fill="#14213D"/>
    <text x="1075" y="425" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Tinos">Rules Engine</text>
    <text x="1075" y="445" text-anchor="middle" fill="#C8102E" font-size="10" font-family="JetBrains Mono">deterministic override</text>
    <text x="1075" y="460" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">news blackout → NEWS</text>
    <text x="1075" y="473" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">gap &gt; 2σ → VOLATILE</text>
    <text x="1075" y="486" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">ADX &gt; 30 ∧ EMA↑ → TREND</text>

    <!-- L4 Scoring -->
    <text x="260" y="530" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L4 · SCORING (ensemble + 3 score outputs)</text>

    <rect x="260" y="540" width="240" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="380" y="565" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">EnsembleVoter</text>
    <text x="380" y="583" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">weighted: HMM 0.30</text>
    <text x="380" y="597" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">LGB 0.50 · Rules 0.20</text>
    <text x="380" y="610" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">Rules can veto (override)</text>
    <text x="380" y="623" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">→ final RegimeLabel</text>

    <rect x="520" y="540" width="240" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="640" y="565" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">ConfidenceScorer</text>
    <text x="640" y="583" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">agreement across 3 models</text>
    <text x="640" y="597" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">1.0 = unanimous</text>
    <text x="640" y="610" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">0.33 = 1/3 agree</text>
    <text x="640" y="623" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">→ confidence ∈ [0, 1]</text>

    <rect x="780" y="540" width="240" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="900" y="565" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">ProbabilityScorer</text>
    <text x="900" y="583" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">softmax(LGB logits)</text>
    <text x="900" y="597" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">+ HMM posteriors</text>
    <text x="900" y="610" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">avg → 4-vector</text>
    <text x="900" y="623" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">P(TREND|RANGE|VOLATILE|NEWS)</text>

    <rect x="1040" y="540" width="200" height="100" fill="#F0FDF4" stroke="#14213D"/>
    <text x="1140" y="565" text-anchor="middle" font-size="12" font-weight="700" font-family="Tinos">ExplainabilityScorer</text>
    <text x="1140" y="583" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">SHAP top-3 features</text>
    <text x="1140" y="597" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">sum of |SHAP| / total</text>
    <text x="1140" y="610" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">→ explainability ∈ [0, 1]</text>
    <text x="1140" y="623" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">1.0 = perfectly explained</text>

    <!-- L5 Publication -->
    <text x="260" y="670" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L5 · PUBLICATION &amp; OBSERVABILITY</text>

    <rect x="260" y="680" width="320" height="80" fill="#14213D"/>
    <text x="420" y="705" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">RegimePublisher</text>
    <text x="420" y="723" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">ZMQ PUB: regime.update</text>
    <text x="420" y="737" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">FlatBuffer payload</text>
    <text x="420" y="750" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">every bar close (M1+)</text>

    <rect x="600" y="680" width="320" height="80" fill="#14213D"/>
    <text x="760" y="705" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">StabilityFilter</text>
    <text x="760" y="723" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">min dwell time: 3 bars</text>
    <text x="760" y="737" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">hysteresis: ±15% on prob</text>
    <text x="760" y="750" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">suppress regime flapping</text>

    <rect x="940" y="680" width="310" height="80" fill="#14213D"/>
    <text x="1095" y="705" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" font-family="Tinos">AuditLogger</text>
    <text x="1095" y="723" text-anchor="middle" fill="#C8102E" font-size="9" font-family="JetBrains Mono">every prediction + features</text>
    <text x="1095" y="737" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">SHAP values per inference</text>
    <text x="1095" y="750" text-anchor="middle" fill="#ffffff" opacity="0.8" font-size="9" font-family="JetBrains Mono">hash-chained WORM store</text>

    <!-- L6 False Positive Controls -->
    <text x="260" y="790" font-size="12" font-weight="700" fill="#C8102E" font-family="JetBrains Mono">L6 · FALSE POSITIVE CONTROLS</text>

    <rect x="260" y="800" width="320" height="50" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="420" y="822" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">ConfirmationFilter</text>
    <text x="420" y="838" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">require 3 consecutive bars · prob &gt; 0.6</text>

    <rect x="600" y="800" width="320" height="50" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="760" y="822" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">HysteresisGate</text>
    <text x="760" y="838" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">enter threshold &gt; 0.65 · exit &lt; 0.50</text>

    <rect x="940" y="800" width="310" height="50" fill="#FEF3F2" stroke="#C8102E" stroke-width="2"/>
    <text x="1095" y="822" text-anchor="middle" font-size="11" font-weight="700" fill="#C8102E" font-family="Tinos">BootstrapValidator</text>
    <text x="1095" y="838" text-anchor="middle" font-size="9" fill="#4A5568" font-family="JetBrains Mono">1000-sample CI on prob · reject if CI width &gt; 0.3</text>

    <!-- Arrows -->
    <g stroke="#C8102E" stroke-width="2" fill="none" marker-end="url(#arR)">
      <line x1="200" y1="425" x2="260" y2="150"/>
      <line x1="200" y1="535" x2="260" y2="335"/>
      <line x1="1250" y1="730" x2="1280" y2="425"/>
    </g>

    <g stroke="#14213D" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="3 3">
      <line x1="640" y1="195" x2="640" y2="225"/>
      <line x1="640" y1="365" x2="640" y2="395"/>
      <line x1="640" y1="505" x2="640" y2="535"/>
      <line x1="640" y1="645" x2="640" y2="675"/>
      <line x1="640" y1="765" x2="640" y2="795"/>
    </g>

    <defs>
      <marker id="arR" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L7,3 z" fill="#C8102E"/>
      </marker>
    </defs>
  </svg>
</div>
</body>
</html>
