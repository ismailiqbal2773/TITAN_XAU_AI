# TITAN XAU AI — Runtime Configuration (Sprint 5)
#
# SAFE DEFAULTS:
#   - dry_run: true          (NO real orders)
#   - live_trading: false    (must be explicitly enabled)
#
# To enable live trading, set BOTH:
#   1. dry_run: false
#   2. Environment variable TITAN_LIVE_TRADING=1
#
# Otherwise the system will fail-closed.

runtime:
  dry_run: true                    # MANDATORY: true = no real orders
  live_trading: false              # MANDATORY: must be false unless operator explicitly enables
  log_level: INFO
  journal_path: data/runtime/titan_journal.jsonl
  session_id: auto                 # "auto" = generated UUID, or explicit string

# ─── Symbol & Timeframe ──────────────────────────────────────────────────────
symbol:
  name: XAUUSD
  timeframe: H1                    # H1 | M30 | M15 | M5
  alternate_names:
    - XAUUSD
    - XAUUSD.c
    - XAUUSD.m
    - GOLD
    - XAU/USD

# ─── Model Paths ─────────────────────────────────────────────────────────────
models:
  xgb_path: titan/data/models/xgboost_v1.pkl
  meta_path: titan/data/models/meta_label_v2_context.pkl
  lstm_path: titan/data/models/lstm_v1.pt           # not used in dry_run (challenger only)
  transformer_path: titan/data/models/transformer_v1.pt  # not used in dry_run
  # HPO params (for reference)
  hpo_params_dir: titan/data/hpo

# ─── Feature Stream ──────────────────────────────────────────────────────────
features:
  window: 300                      # bars to keep in rolling buffer (min 220)
  source: mt5                      # canonical | mt5
  canonical_path: titan/data/canonical/XAUUSD_H1_canonical.parquet

# ─── Inference ───────────────────────────────────────────────────────────────
inference:
  xgb_threshold: 0.55              # P ≥ 0.55 → directional signal
  meta_threshold: 0.65             # P(win) ≥ 0.65 → trade approved

# ─── Risk Limits ─────────────────────────────────────────────────────────────
risk:
  max_lot: 0.01                    # HARD CAP — cannot exceed
  max_open_positions: 1            # HARD CAP — one position at a time
  sl_mode: atr                     # fixed | atr (default: atr)
  sl_pips: 50                      # Used when sl_mode=fixed (50 pips = $0.50)
  tp_pips: 100                     # Used when sl_mode=fixed (100 pips = $1.00)
  atr_period: 14                   # ATR lookback bars
  atr_sl_multiplier: 2.0           # SL = atr_sl_multiplier × ATR (balanced default)
  atr_tp_multiplier: 4.0           # TP = atr_tp_multiplier × ATR (balanced default)
  max_spread_usd: 1.0              # Reject if spread > $1.00
  deviation_points: 20             # Max slippage in points
  magic_number: 202619             # TITAN identifier

# ─── ATR Execution Profiles ──────────────────────────────────────────────────
# Switch profiles by setting risk.sl_mode=atr and changing multipliers.
# Or use profile name below (overrides risk.atr_sl_multiplier / atr_tp_multiplier).
atr_profiles:
  challenge:                       # Safest: lowest DD, 100% FTMO pass
    atr_sl_multiplier: 1.5
    atr_tp_multiplier: 3.0
  balanced:                        # DEFAULT: good balance of profit + safety
    atr_sl_multiplier: 2.0
    atr_tp_multiplier: 4.0
  production_aggressive:           # Highest Sharpe + PnL, slightly higher DD
    atr_sl_multiplier: 3.0
    atr_tp_multiplier: 6.0

# ─── Prop Firm Adaptive Risk Layer (Sprint 9.0) ──────────────────────────────
# When enabled=true, TITAN enforces prop-firm-specific risk rules from
# config/prop_firm_profiles.yaml. When enabled=false (default), existing
# runtime behavior is unchanged — no risk to current dry-run / live-trading flow.
#
# Profile selection:
#   profile: none                → prop firm layer disabled (default)
#   profile: auto                → auto-detect from MT5 account_info (advisory only;
#                                   TITAN refuses to start until operator confirms)
#   profile: ftmo_challenge      → load FTMO challenge profile
#   profile: ftmo_verification   → load FTMO verification profile
#   profile: ftmo_funded         → load FTMO funded profile (trailing DD)
#   profile: fundednext_challenge
#   profile: fundednext_funded
#   profile: the5ers_challenge
#   profile: myfundedfx_challenge
#   profile: custom              → use custom_overrides below
#
# Safety invariants:
#   - profile max_lot can only DECREASE risk (trade_loop MAX_LOT_CAP=0.01 hard-coded)
#   - profile never changes dry_run / live_trading flags
#   - profile never changes models, thresholds, or ATR formulas
#   - all profile decisions journaled via EventType.PROFILE_*
prop_firm:
  enabled: false                    # DEFAULT: false — no behavior change
  profile: none                     # none | auto | <profile_id>
  phase: challenge                  # challenge | verification | funded
  auto_detect_on_start: true        # suggest from MT5 account_info (advisory only)
  lock_after_load: true             # lock profile for challenge duration
  initial_balance: 100000.0         # challenge starting balance (for % calc)
  custom_overrides: {}              # only used when profile=custom

# ─── Demo Micro Full-Cycle Test (Sprint 9.9) ────────────────────────────────
# Controlled DEMO-only micro test harness. Default disabled.
# Z AI must NEVER run DEMO_MICRO_EXECUTE — operator only.
demo_micro:
  enabled: false
  require_operator_arm: true
  arm_token_env: TITAN_DEMO_MICRO_ARMED
  account_type_required: DEMO
  symbol: XAUUSD
  timeframe: H1
  max_lot: 0.01
  max_open_positions: 1
  max_trades_per_run: 1
  max_duration_minutes: 240
  max_daily_loss_pct: 0.25
  max_total_loss_pct: 0.50
  force_close_on_end: true
  force_close_after_minutes: 240
  allow_weekend: false
  allow_high_spread: false
  max_spread_usd: 1.0
  no_trade_news_window_minutes: 30
  journal_path: data/audit/demo_micro/demo_micro_journal.jsonl

# ─── Universal Execution Intelligence (Sprint 9.5) ───────────────────────────
# When enabled=true, TITAN auto-detects broker properties, scores broker
# quality continuously, selects execution profile automatically, and adapts
# risk based on broker quality. When enabled=false (default), existing
# runtime behavior is unchanged.
#
# Safety invariants:
#   - All engines optional, fail-closed
#   - Broker quality can only DECREASE risk, never increase
#   - Hard caps (max_lot=0.01) always enforced
#   - dry_run / live_trading flags never changed
#   - Models, thresholds, ATR, inference — all untouched
broker_intelligence:
  enabled: false                    # DEFAULT: false — no behavior change
  quality_check_interval_s: 30.0    # score broker every N seconds
  history_dir: data/runtime/broker_history
  # Auto execution profile thresholds (broker quality → profile)
  auto_profile:
    enabled: true                   # auto-select execution profile
    institutional_min: 95           # ≥95 → institutional
    excellent_min: 85               # 85-94 → excellent
    good_min: 75                    # 75-84 → good
    average_min: 60                 # 60-74 → average
    # below 60 → unsafe (halt new entries)
  # Auto risk adaptation (broker quality → risk multiplier)
  risk_adaptation:
    enabled: true
    institutional_multiplier: 1.0   # cannot exceed 1.0 (hard cap)
    excellent_multiplier: 1.0
    good_multiplier: 0.8
    average_multiplier: 0.6
    unsafe_multiplier: 0.0          # halt
  # Self-protection triggers
  self_protection:
    enabled: true
    max_spread_spike_usd: 3.0       # spread > $3 → EXECUTION_WARNING
    max_latency_ms: 1000            # latency > 1000ms → EXECUTION_DEGRADED
    max_requote_rate: 0.10          # >10% requotes → EXECUTION_DEGRADED
    max_rejection_rate: 0.10        # >10% rejections → BROKER_UNSAFE
    pause_entries_on_unsafe: true   # halt new entries when unsafe

# ─── AI Exit Intelligence (Sprint 9.6) ───────────────────────────────────────
# When enabled=true, TITAN evaluates every open position continuously and
# makes institutional-grade exit decisions (HOLD/PARTIAL/BE/TRAIL/BOOK/FULL/
# EMERGENCY). Replaces static TP + fixed-R break-even with AI-driven exits.
# When enabled=false (default), existing ExitManager behavior is unchanged.
#
# Safety invariants:
#   - All engines optional, fail-closed
#   - Exit AI can only DECREASE risk (exit earlier/tighter), never increase
#   - Hard caps (max_lot=0.01) always enforced
#   - dry_run / live_trading flags never changed
#   - Models, thresholds, ATR, inference — all untouched
exit_intelligence:
  enabled: false                    # DEFAULT: false — no behavior change
  eval_interval_s: 5.0              # evaluate open positions every N seconds
  # AI Exit Engine weights (sum to ~1.0)
  weights:
    xgb_confidence: 0.15
    meta_confidence: 0.15
    trend_strength: 0.15
    momentum: 0.10
    volatility: 0.05
    atr: 0.10
    time_in_trade: 0.05
    floating_pnl: 0.10
    r_multiple: 0.05
    broker_quality: 0.05
    news_status: 0.03
    session: 0.02
  # Dynamic TP extension
  dynamic_tp:
    strong_trend_extension_pct: 50  # extend TP by 50% in strong trend
    weak_momentum_reduction_pct: 25 # reduce TP by 25% in weak momentum
    sideways_early_exit_pct: 75     # exit at 75% of TP in sideways
  # Adaptive trailing
  trailing:
    base_atr_multiplier: 1.0        # base trail = 1.0 × ATR
    strong_trend_loosen: 2.0        # loosen to 2.0 × ATR in strong trend
    weak_market_tighten: 0.5        # tighten to 0.5 × ATR in weak market
    min_trail_distance_atr: 0.3     # never trail closer than 0.3 × ATR
  # Partial profit engine
  partial_exits:
    enabled: true
    levels:
      - r_multiple: 1.0             # at +1R
        close_pct: 25               # close 25%
      - r_multiple: 2.0             # at +2R
        close_pct: 25               # close 25%
      - r_multiple: 3.0             # at +3R
        close_pct: 25               # close 25%
    min_remaining_pct: 25           # never close below 25% remaining
  # Early exit triggers
  early_exit:
    meta_confidence_collapse: 0.40  # meta < 0.40 → early exit
    trend_reversal_threshold: -0.3  # trend strength < -0.3 → early exit
    momentum_collapse: 0.20         # momentum < 0.20 → early exit
  # Time exit
  time_exit:
    max_holding_hours_strong_trend: 48
    max_holding_hours_normal: 24
    max_holding_hours_sideways: 8
  # CEO governance
  governance:
    enabled: true
    weights:
      exit_ai: 0.40
      risk_engine: 0.20
      capital_protection: 0.15
      broker_intelligence: 0.10
      meta_model: 0.10
      context_engine: 0.05

# ─── Adaptive Capital Protection Layer (Sprint 9.2) ──────────────────────────
# When enabled=true, TITAN computes an account health score (0-100) every
# heartbeat and dynamically adjusts risk multiplier, max exposure, and trading
# permission based on 5 health profiles. When enabled=false (default), existing
# runtime behavior is unchanged — no risk to current dry-run / live-trading flow.
#
# Safety invariants:
#   - Capital protection can only DECREASE risk, never increase
#   - Hard caps (max_lot=0.01, max_open_positions=1) always enforced
#   - dry_run / live_trading flags never changed
#   - Models, thresholds, ATR formulas, inference logic — all untouched
#   - All transitions journaled via EventType.HEALTH_TRANSITION + RISK_PROFILE_CHANGED
capital_protection:
  enabled: false                    # DEFAULT: false — no behavior change
  health_check_interval_s: 30.0     # compute health score every N seconds
  # Health score weights (must sum to ~1.0)
  weights:
    daily_dd: 0.20                  # 20% weight on daily drawdown
    total_dd: 0.20                  # 20% weight on total drawdown
    consecutive_losses: 0.15        # 15% weight on consecutive losses
    winning_streak: 0.10            # 10% weight on winning streak (positive)
    equity_slope: 0.10              # 10% weight on equity slope (positive = healthy)
    volatility_regime: 0.05         # 5% weight on volatility regime
    kill_switch_state: 0.15         # 15% weight on kill-switch state
    recovery_status: 0.05           # 5% weight on recovery status
  # Recovery mode triggers
  recovery:
    losing_streak_threshold: 3      # consecutive losses → recovery mode
    min_confidence_threshold: 0.75  # only allow trades with ≥ this confidence
    recovery_target_trades: 2       # N winning trades to exit recovery
    risk_multiplier: 0.5            # halve risk in recovery
  # Capital preservation (near prop-firm DD limits)
  capital_preservation:
    trigger_dd_pct: 8.0             # activate at 8% total DD (FTMO limit is 10%)
    halt_new_entries_dd_pct: 9.0    # stop new entries at 9% DD
    risk_multiplier: 0.25           # quarter risk in capital preservation
  # Profit lock
  profit_lock:
    enabled: false                  # off by default — opt-in feature
    lock_distance_pct: 2.0          # lock equity after +2% gain
    trail_distance_pct: 1.0         # allow equity to dip 1% below peak before lock
  # Health → risk profile mapping (Health score → risk multiplier)
  health_profiles:
    normal:                         # 90-100
      min_health: 90
      risk_multiplier: 1.0
      max_exposure_multiplier: 1.0
      allow_new_entries: true
    slight_reduction:               # 75-89
      min_health: 75
      risk_multiplier: 0.75
      max_exposure_multiplier: 0.75
      allow_new_entries: true
    defensive:                      # 50-74
      min_health: 50
      risk_multiplier: 0.5
      max_exposure_multiplier: 0.5
      allow_new_entries: true
    recovery_mode:                  # 25-49
      min_health: 25
      risk_multiplier: 0.25
      max_exposure_multiplier: 0.25
      allow_new_entries: true
    capital_preservation:           # 0-24
      min_health: 0
      risk_multiplier: 0.0
      max_exposure_multiplier: 0.0
      allow_new_entries: false

# ─── Kill-Switch FSM ─────────────────────────────────────────────────────────
kill_switch:
  max_daily_loss_pct: 3.0          # → HALT_NEW_TRADES
  max_drawdown_pct: 5.0            # → FLATTEN_ONLY
  max_consecutive_losses: 5        # → HALT_NEW_TRADES
  emergency_daily_loss_pct: 5.0    # → EMERGENCY_STOP
  emergency_drawdown_pct: 8.0      # → EMERGENCY_STOP
  max_latency_ms: 500.0            # → CAUTION
  emergency_latency_ms: 1000.0     # → EMERGENCY_STOP
  max_spread_usd: 1.0              # → CAUTION
  emergency_spread_usd: 2.0        # → HALT_NEW_TRADES
  max_brier: 0.22                  # → CAUTION
  emergency_brier: 0.28            # → HALT_NEW_TRADES
  max_ece: 0.08                    # → CAUTION
  emergency_ece: 0.12              # → HALT_NEW_TRADES

# ─── News Filter ─────────────────────────────────────────────────────────────
news_filter:
  enabled: true
  csv_path: data/economic_calendar.csv   # offline CSV (no paid API)
  block_window_minutes: 30               # block ±30 min around high-impact events
  event_types:                           # NFP, CPI, FOMC, ECB, BOE
    - NFP
    - CPI
    - FOMC
    - ECB
    - BOE

# ─── Slippage Monitor ────────────────────────────────────────────────────────
slippage:
  window_size: 100                 # rolling window of fills
  caution_mean_pips: 2.0           # → CAUTION
  caution_p95_pips: 5.0            # → CAUTION
  halt_mean_pips: 5.0              # → HALT
  halt_p95_pips: 10.0              # → HALT
  halt_max_pips: 20.0              # single fill → HALT

# ─── Drift Monitor ───────────────────────────────────────────────────────────
drift:
  window_size: 200                 # rolling window of predictions
  psi_caution: 0.10                # → CAUTION
  psi_emergency: 0.25              # → EMERGENCY_STOP
  ece_caution: 0.08                # → CAUTION
  ece_emergency: 0.12              # → EMERGENCY_STOP
  brier_caution: 0.22              # → CAUTION
  brier_emergency: 0.28            # → EMERGENCY_STOP
  winrate_drift_caution: 0.10      # → CAUTION
  winrate_drift_emergency: 0.20    # → EMERGENCY_STOP
  confidence_drift_caution: 0.10   # → CAUTION
  n_bins: 10                       # bins for PSI + ECE

# ─── Watchdog ────────────────────────────────────────────────────────────────
watchdog:
  enabled: true
  dry_run: true                    # MANDATORY: true = log only, no auto-restart
  check_interval_s: 10.0
  max_restarts_per_minute: 3
  components:
    - name: inference_loop
      expected_interval_s: 60.0
      threshold_misses: 3
    - name: position_sync_loop
      expected_interval_s: 10.0
      threshold_misses: 3

# ─── Exit Manager ────────────────────────────────────────────────────────────
exit_manager:
  max_holding_hours: 24.0
  stale_threshold_seconds: 300.0
  trailing_activation_r_multiple: 1.0    # activate trailing after +1R
  trailing_distance_r: 0.5               # trail 0.5R behind current price
  enable_trailing: true
  enable_max_holding: true
  enable_stale: true

# ─── Position Sync ───────────────────────────────────────────────────────────
position_sync:
  interval_seconds: 10.0
  broker_source: stub              # stub | mt5 (use "mt5" on Windows only)
  magic_filter: 202619             # only sync TITAN positions

# ─── MT5 Connection (Windows only — placeholders for dry_run) ────────────────
mt5:
  terminal_path: ""                # Set on Windows: C:\Program Files\MetaTrader 5\terminal64.exe
  login: 0                         # Set your MT5 demo login
  password: ""                     # Set your MT5 demo password (use env var in prod)
  server: ""                       # Set your broker server (e.g., FundedNext-Server 3)
  timeout: 60000
