# TITAN XAU AI — Dependency Policy
# =================================
#
# Governs how dependencies are pinned, updated, and rolled back.
# This file is the SOURCE OF TRUTH — the dependency readiness audit
# (scripts/audit/dependency_update_readiness_audit.py) reads it.
#
# Safety principles:
#   - Pinned versions everywhere. No floating ranges in production.
#   - Python 3.12+ required (3.13 / 3.14 tolerated; <3.12 BLOCKED).
#   - MetaTrader5 is OPTIONAL and Windows-only. Its absence must NOT
#     block Linux dev/CI — the mt5_stub shim covers it.
#   - Lockfile (requirements-lock.txt) is mandatory for reproducible
#     installs.
#   - Unsafe auto-update (e.g. `pip install -U` on every boot) is
#     FORBIDDEN. Updates are operator-initiated and auditable.
#   - Rollback: requirements-lock.txt is git-versioned; a bad update is
#     rolled back via `git checkout` of the lockfile + reinstall.

policy_version: "1.0"
policy_name: "TITAN_XAU_AI_DEPENDENCY_POLICY"

# ─── Python version requirement ────────────────────────────────────────────
python:
  min_version: "3.12.0"
  recommended_version: "3.12.13"
  # Versions newer than max_tested are tolerated but warned.
  max_tested_version: "3.12.13"
  notes: |
    Python 3.12+ is required. Earlier versions are BLOCKED because the
    codebase uses 3.12+ syntax (PEP 695 generics, match statements,
    `from __future__ import annotations` everywhere).

# ─── Pinned dependencies policy ────────────────────────────────────────────
pinning:
  # All production dependencies MUST be pinned with `==` in
  # requirements-lock.txt. Floating ranges (>=, ~=, >) are BLOCKED.
  require_exact_pin: true
  # The lockfile is the canonical source of versions.
  lockfile: "requirements-lock.txt"
  # requirements.txt may use >= ranges for human-readable docs, but the
  # lockfile must be used for actual installs.
  allow_floating_in_requirements_txt: true
  forbid_floating_in_lockfile: true
  # Hash-checking mode is RECOMMENDED but not yet enforced.
  require_hashes: false
  notes: |
    Every package in requirements-lock.txt must use `==` pinning.
    The lockfile is regenerated by an operator after explicit testing.

# ─── MT5 package check ─────────────────────────────────────────────────────
metaTrader5:
  # MetaTrader5 is Windows-only and OPTIONAL. Its absence on Linux/macOS
  # MUST NOT block development or CI.
  required: false
  platform: "win32"
  # When MT5 is installed, this is the pinned version.
  pinned_version: "5.0.45"
  # Linux/macOS use the titan/mt5_stub.py shim, injected by conftest.py.
  shim_module: "titan.mt5_stub"
  # The MetaTrader5 package import must NEVER be called from the audit
  # path, the licensing path, or the resilience path. This is an explicit,
  # closed list — pre-existing MT5-using audit scripts (e.g. raw_mt5_probe)
  # are allowed to import MT5.
  forbidden_in_modules:
    - "titan/commercial/licensing/license_validator.py"
    - "titan/commercial/licensing/machine_binding.py"
    - "titan/commercial/licensing/expiry_guard.py"
    - "titan/commercial/licensing/license_audit.py"
    - "titan/production/runtime_health_guard.py"
    - "titan/production/fail_closed_runtime_guard.py"
    - "titan/production/watchdog_restarter.py"
    - "scripts/audit/licensing_readiness_audit.py"
    - "scripts/audit/runtime_resilience_audit.py"
    - "scripts/audit/dependency_update_readiness_audit.py"
  notes: |
    MetaTrader5 is optional and Windows-only. On Linux/macOS, the
    mt5_stub shim provides a deterministic mock. The new licensing,
    resilience, and readiness-audit modules must NEVER import MT5 —
    they must remain pure-Python. Pre-existing MT5-using scripts
    (raw_mt5_probe, demo_micro_*, etc.) are NOT in the forbidden
    list and may continue to import MT5.

# ─── Lockfile requirement ──────────────────────────────────────────────────
lockfile:
  required: true
  path: "requirements-lock.txt"
  # The lockfile must be git-versioned so updates are auditable.
  must_be_versioned: true
  # The lockfile must declare the Python version it was generated against.
  must_declare_python_version: true
  notes: |
    requirements-lock.txt is the canonical, git-versioned lockfile.
    Every dependency update MUST be committed with a clear message
    explaining the rationale and the test plan.

# ─── Unsafe auto-update disabled ───────────────────────────────────────────
auto_update:
  # `pip install -U` on every boot is FORBIDDEN.
  forbidden_on_boot: true
  # Auto-update scripts (e.g. `pip install --upgrade` in CI) are forbidden.
  forbidden_in_ci: true
  # The only allowed update path is operator-initiated:
  #   1. pip install -U <pkg>==<new_version>
  #   2. pip freeze > requirements-lock.txt (or pip-compile)
  #   3. Run full test suite
  #   4. git commit requirements-lock.txt with rationale
  allowed_update_path: "operator_initiated_with_tests"
  notes: |
    Auto-update is FORBIDDEN. Updates are operator-initiated, tested,
    and auditable. The system must NEVER silently change dependency
    versions at runtime.

# ─── Rollback notes ────────────────────────────────────────────────────────
rollback:
  # If an update breaks the system, rollback is via git.
  method: "git_checkout_lockfile"
  steps:
    - "git checkout HEAD~1 -- requirements-lock.txt"
    - "pip install -r requirements-lock.txt --force-reinstall"
    - "python -m pytest titan/tests/ -x"
  # The previous lockfile is always recoverable from git history.
  always_recoverable: true
  # Rollback SLA: 15 minutes (operator must be on-call).
  sla_minutes: 15
  notes: |
    Rollback is always possible via git history of requirements-lock.txt.
    The operator runs `git checkout HEAD~1 -- requirements-lock.txt`
    followed by a forced reinstall. Total rollback time ≤ 15 minutes.

# ─── Banned patterns ───────────────────────────────────────────────────────
banned:
  # These betting / money-management patterns are NEVER allowed in any
  # dependency or in any module.
  patterns:
    - "martingale"
    - "grid_doubling"
    - "averaging_down"
    - "loss_based_lot_multiplier"
  # These package types are forbidden:
  #  - Packages that auto-download binaries at import time
  #  - Packages that require root / sudo to install
  #  - Packages with known supply-chain incidents (CVE-2024-* in pypi advisories)
  forbidden_package_traits:
    - "downloads_binaries_at_import"
    - "requires_root"
    - "known_supply_chain_incident"
  notes: |
    Banned betting patterns (martingale, grid doubling, averaging down,
    loss-based lot multiplier) are forbidden in ALL modules and ALL
    dependencies. The audit scans for these and BLOCKS if found.

# ─── Audit integration ─────────────────────────────────────────────────────
audit:
  script: "scripts/audit/dependency_update_readiness_audit.py"
  verdicts:
    - "DEPENDENCY_READY"
    - "DEPENDENCY_NEEDS_UPDATE"
    - "DEPENDENCY_BLOCKED"
  # The audit must NEVER call mt5.order_send.
  forbid_order_send: true
  # The audit must NEVER auto-install packages.
  forbid_pip_install: true
  notes: |
    The dependency readiness audit enforces this policy. It NEVER calls
    mt5.order_send and NEVER runs pip install.
