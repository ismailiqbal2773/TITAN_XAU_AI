    max_open_positions: 1
    max_lot: 0.01
    risk_per_trade_pct: 0.008
    max_symbol_exposure: 0.01
    atr_profile: challenge           # 1.5/3.0 (low-DD firm)
    phase: challenge
    hedging_allowed: false
    notes: "The 5ers: 6% target, 4% daily, 6% DD, 2min news blackout, no hedging"

  # ─── MyFundedFX ────────────────────────────────────────────────────────────
  myfundedfx_challenge:
    firm_id: myfundedfx
    name: "MyFundedFX Challenge"
    initial_balance: 100000.0
    profit_target_pct: 0.08          # 8% target
    max_daily_loss_pct: 0.05
    max_total_loss_pct: 0.10
    emergency_halt_pct: 0.08
    daily_caution_pct: 0.04
    drawdown_mode: static
    daily_loss_mode: balance_based
    min_trading_days: 3              # MyFundedFX requires 3 days
    max_trading_days: 0
    consistency_rule_enabled: false
    consistency_pct: 0.0
    weekend_close_required: true
    use_news_filter: true
