    phase: funded
    hedging_allowed: true
    notes: "FundedNext Funded: trailing DD, no target, no consistency"

  # ─── The 5ers ──────────────────────────────────────────────────────────────
  the5ers_challenge:
    firm_id: the5ers
    name: "The 5ers Challenge"
    initial_balance: 100000.0
    profit_target_pct: 0.06          # 6% target
    max_daily_loss_pct: 0.04         # 4% daily (tighter)
    max_total_loss_pct: 0.06         # 6% overall (tighter)
    emergency_halt_pct: 0.05
    daily_caution_pct: 0.035
