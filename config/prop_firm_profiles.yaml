# ─── MT5 auto-detection rules ────────────────────────────────────────────────
# Used by PropFirmProfileManager.auto_detect(mt5_account_info).
# Auto-detection is ADVISORY ONLY — never auto-applies. Operator must confirm.
auto_detect:
  rules:
    - match: "FTMO"
      field: company
      profile: ftmo_challenge
    - match: "FundedNext"
      field: company
      profile: fundednext_challenge
    - match: "5ers"
      field: company
      profile: the5ers_challenge
    - match: "MyFundedFX"
      field: company
      profile: myfundedfx_challenge
  on_no_match: refuse_start          # refuse_start | default_to_custom

# ─── ATR profile mapping (already exists in runtime.yaml:atr_profiles) ───────
# Referenced by profiles via `atr_profile` field:
#   challenge           → atr_sl_multiplier: 1.5, atr_tp_multiplier: 3.0
#   balanced            → atr_sl_multiplier: 2.0, atr_tp_multiplier: 4.0
#   production_aggressive → atr_sl_multiplier: 3.0, atr_tp_multiplier: 6.0
